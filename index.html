    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{min-height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased} body{padding:env(safe-area-inset-top) 0 calc(86px + var(--safe-bottom));font-size:16px;line-height:1.35} button,input,textarea,select{font:inherit;font-size:16px} button{border:0;background:none;color:inherit;cursor:pointer}.app{max-width:760px;margin:0 auto}.top{position:sticky;top:0;z-index:5;background:rgba(247,251,250,.96);backdrop-filter:blur(18px);padding:18px 18px 0;border-bottom:1px solid rgba(226,235,233,.9)}.navline{display:flex;align-items:center;gap:10px;min-width:0}.back{font-weight:700;color:var(--accent);white-space:nowrap}.title{font-size:26px;line-height:1.12;margin:0 0 7px;font-weight:700;letter-spacing:-.03em}.stats{margin:0 0 16px;color:var(--muted);font-size:14px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.tab{position:relative;padding:9px 4px 14px;text-align:center;font-weight:700;font-size:16px;color:#7a8785}.tab.active{color:var(--accent)}.tab.active:after{content:"";position:absolute;left:20%;right:20%;bottom:0;height:3px;border-radius:99px;background:var(--accent)}.count{display:inline-grid;place-items:center;min-width:21px;height:21px;margin-left:4px;padding:0 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;vertical-align:1px}.page{padding:14px 18px 24px}.filters{display:flex;gap:8px;overflow:auto;padding-bottom:12px;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-weight:700;font-size:14px;color:#70807e}.chip.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}.search{width:100%;height:52px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:0 16px;outline:none;margin:0 0 14px;box-shadow:0 1px 0 rgb idth:62px;height:62px;border-radius:22px;background:var(--accent);color:#fff;font-size:34px;box-shadow:var(--shadow)}.project-card,.note-card{padding-left:16px}.project-card:before,.note-card:before{display:none}.meta{color:#8b9896;font-size:14px;margin:6px 0 13px}.progress{height:8px;background:var(--accent-soft);border-radius:999px;overflow:hidden;margin:8px 0 13px}.progress span{display:block;height:100%;background:var(--accent)}.overlay{position:fixed;inset:0;z-index:30;background:rgba(15,23,42,.36);display:none;align-items:flex-end}.overlay.show{display:flex}.sheet{width:100%;max-height:86vh;overflow:auto;background:#fff;border-radius:22px 22px 0 0;padding:12px 18px calc(24px + var(--safe-bottom));box-shadow:0 -18px 50px rgba(15,23,42,.18)}.grab{width:48px;height:5px;border-radius:99px;background:#d8e2e0;margin:4px auto 18px}.sheet h2{font-size:22px;margin:0 0 18px}.form{display:grid;gap:15px}.field{display:grid;gap:8px}.field label{font-size:14px;font-weight:700;color:#657472}.field input,.field textarea,.field select,.editable{width:100%;min-height:50px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:13px 14px;outline:none;-webkit-appearance:none}.field textarea{min-height:76px;resize:vertical}.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px}.editbox{border:1px solid var(--line);border-radius:14px;overflow:hidden}.editbar{display:flex;gap:5px;align-items:center;padding:8px;border-bottom:1px solid var(--line);overflow:auto}.tool{height:36px;min-width:40px;border-radius:10px;font-weight:700}.tool:hover{background:#f4faf9}.sep{height:28px;width:1px;background:var(--line);flex:0 0 auto}.editable{border:0;border-radius:0;min-height:140px;line-height:1.45}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full-editor{position:fixed;inset:0;z-index:40;background:#fff;display:none;padding-top:env(safe-area-inset-top)}.full-editor.show{display:block}.editor-top{height:62px;display:flex;align-items: <body>
  <main class="app"><header id="top" class="top"><div id="navline" class="navline hidden"><button class="back" id="backBtn">← Назад</button><h1 class="title" id="contextTitle"></h1></div><h1 id="mainTitle" class="title">Задачи юриста</h1><p class="stats" id="stats"></p><nav class="tabs" id="tabs"><button class="tab active" data-tab="tasks">Задачи <span class="count" id="tasksCount">0</span></button><button class="tab" data-tab="projects">Проекты <span class="count" id="projectsCount">0</span></button><button class="tab" data-tab="notes">Заметки <span class="count" id="notesCount">0</span></button></nav></header><section class="page" id="page"></section></main><button class="fab" id="fab">+</button>
  <section class="overlay" id="taskSheet"><div class="sheet"><div class="grab"></div><h2 id="taskSheetTitle">Задача</h2><form id="taskForm" class="form"></form></div></section><section class="overlay" id="projectSheet"><div class="sheet"><div class="grab"></div><h2 id="projectSheetTitle">Проект</h2><form id="projectForm" class="form"></form></div></section>
  <section class="full-editor" id="noteEditor"><div class="editor-top"><button id="closeNote">← Назад</button><button id="saveNoteBtn">Сохранить</button></div><input id="noteTitle" class="note-title" placeholder="Заголовок"><div class="note-editbar"><button class="tool" data-note-cmd="undo">↩</button><button class="tool" data-note-cmd="redo">↪</button><span class="sep"></span><button class="tool" data-note-cmd="bold">B</button><button class="tool" data-note-cmd="insertUnorderedList">• Список</button><span class="sep"></span><button class="tool" id="attachBtn">📎</button></div><div class="attach-menu" id="attachMenu"><button data-accept="*/*">Документ</button><button data-accept="image/*">Фото</button></div><input id="attachInput" type="file" hidden><div id="noteBody" class="note-body" contenteditable="true" data-placeholder="Начните писать..."></div><div id="attachments" class="attachments"></div></section>
  <input id="restoreInput" type="file" accept="application/json" hidden><div class="toast" id="toast"></div>
<script>
const A='#0D9488',LS={tasks:'lawyerTasks',projects:'lawyerProjects',projectTasks:'lawyerProjectTasks',notes:'lawyerNotes'};const statusText={new:'Новая',inwork:'В работе',waiting:'Ожидание',done:'Завершена'},priorityText={none:'Обычная',low:'Низкая',normal:'Обычная',medium:'Средняя',high:'Высокая'},stripe={none:'#cbd5e1',low:'#94a3b8',normal:A,medium:'#e87800',high:'#ef4444',done:'#16a34a'};let state={tab:'tasks',filter:'active',projectId:null,editingTask:null,editingProject:null,note:null,showCompleted:false};const $=s=>document.querySelector(s),load=k=>JSON.parse(localStorage.getItem(k)||'[]'),save=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),now=()=>new Date().toISOString(),uid=()=>String(Date.now()+Math.floor(Math.random()*999)),valid=o=>o&&o.id,esc=s=>String(s??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));
function sanitize(html){const t=document.createElement('template');t.innerHTML=html||'';const ok=['B','STRONG','I','EM','UL','OL','LI','BR','P','DIV'];(function walk(n){[...n.children].forEach(e=>{if(!ok.includes(e.tagName)){e.replaceWith(document.createTextNode(e.textContent));return}[...e.attributes].forEach(a=>{if(a.name!=='style')e.removeAttribute(a.name)});if(e.getAttribute('style')){const st=e.getAttribute('style').split(';').filter(x=>/^\s*font-(weight|style)\s*:/i.test(x)).join(';');st?e.setAttribute('style',st):e.removeAttribute('style')}walk(e)})})(t.content);return t.innerHTML}function fmtDate(v){if(!v)return'';return new Date(v+'T00:00:00').toLocaleDateString('ru-RU')}function overdue(t){return t.dueDate&&t.status!=='done'&&new Date(t.dueDate+'T23:59:59')<new Date()}
function seed(){if(!localStorage.getItem(LS.tasks))save(LS.tasks,[{id:uid(),title:'Ответ на претензию контрагента',extra:'Проверить позицию банка и сроки ответа',dueDate:'2026-07-08',reminder:2,priority:'high',status:'inwork',notes:'',createdAt:now(),updatedAt:now()},{id:uid(),title:'Проверить договор аренды',extra:'Новый арендатор, помещение на 3 этаже',dueDate:'2026-07-11',reminder:2,priority:'medium',status:'new',notes:'',createdAt:now(),updatedAt:now()},{id:uid(),title:'Обновить шаблоны типовых договоров',extra:'Согласовать с комплаенс',dueDate:'',reminder:0,priority:'low',status:'waiting',notes:'',createdAt:now(),updatedAt:now()}]);if(!localStorage.getItem(LS.projects))save(LS.projects,[{id:uid(),title:'Торговый оборот',description:'Задачи, связанные с торговым оборотом банка',createdAt:now(),updatedAt:now()}]);if(!localStorage.getItem(LS.projectTasks))save(LS.projectTasks,[]);if(!localStorage.getItem(LS.notes))save(LS.notes,[])}
function initAssets(){const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop stop-color='${A}'/><stop offset='1' stop-color='#065F56'/></linearGradient></defs><rect width='180' height='180' rx='42' fill='url(#g)'/><circle cx='90' cy='90' r='50' fill='rgba(255,255,255,.24)' stroke='rgba(255,255,255,.65)' stroke-width='3'/><path d='M62 91l20 20 40-48' fill='none' stroke='white' stroke-width='13' stroke-linecap='round' stroke-linejoin='round'/></svg>`;faviconLink.href='data:image/svg+xml,'+encodeURIComponent(svg);manifestLink.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify({name:'Задачи юриста',short_name:'Юрист',start_url:'.',display:'standalone',background_color:'#ffffff',theme_color:A,icons:[]}));const c=document.createElement('canvas');c.width=c.height=180;const x=c.getContext('2d'),g=x.createLinearGradient(0,0,180,180);g.addColorStop(0,A);g.addColorStop(1,'#065F56');x.fillStyle=g;x.roundRect(0,0,180,180,42);x.fill();x.fillStyle='rgba(255,255,255,.24)';x.strokeStyle='rgba(255,255,255,.65)';x.lineWidth=3;x.beginPath();x.arc(90,90,50,0,7);x.fill();x.stroke();x.strokeStyle='#fff';x.lineWidth=13;x.lineCap='round';x.lineJoin='round';x.beginPath();x.moveTo(62,91);x.lineTo(82,111);x.lineTo(122,63);x.stroke();appleIconLink.href=c.toDataURL('image/png')}
function tasks(){return state.projectId?load(LS.projectTasks).filter(t=>valid(t)&&t.projectId===state.projectId):load(LS.tasks).filter(valid)}function putTasks(arr){if(state.projectId)save(LS.projectTasks,[...load(LS.projectTasks).filter(t=>t.projectId!==state.projectId),...arr]);else save(LS.tasks,arr)}function counts(){return{tasks:load(LS.tasks).filter(t=>valid(t)&&t.status!=='done').length,projects:load(LS.projects).filter(valid).length,notes:load(LS.notes).filter(valid).length}}function statsLine(){const ts=tasks();return`${ts.filter(t=>t.status==='inwork').length} в работе · ${ts.filter(overdue).length} просрочено · ${ts.filter(t=>t.status==='done').length} завершено`}
function updateHeader(){const c=counts(),projects=load(LS.projects).filter(valid),project=projects.find(p=>p.id===state.projectId);tasksCount.textContent=c.tasks;projectsCount.textContent=c.projects;notesCount.textContent=c.notes;stats.textContent=statsLine();navline.classList.toggle('hidden',!project);tabs.classList.toggle('hidden',!!project);mainTitle.classList.toggle('hidden',!!project);if(project)contextTitle.textContent=project.title;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab))}function render(){updateHeader();page.innerHTML='';if(state.projectId||state.tab==='tasks')return renderTasks();if(state.tab==='projects')return renderProjects();if(state.tab==='notes')return renderNotes()}
function renderFilters(){return`<div class="filters"><button class="chip ${state.filter==='active'?'active':''}" data-filter="active">Все активные</button><button class="chip ${state.filter==='inwork'?'active':''}" data-filter="inwork">В работе</button><button class="chip ${state.filter==='waiting'?'active':''}" data-filter="waiting">Ожидание</button></div>`}function taskPass(t){return state.filter==='active'?t.status!=='done':t.status===state.filter}function taskCard(t,done=false){return`<article class="card" style="--stripe:${t.status==='done'?stripe.done:stripe[t.priority]||A}"><h3>${esc(t.title)}</h3>${t.extra?`<p class="extra">${esc(t.extra)}</p>`:''}<div class="badges"><span class="badge status-${t.status}">${statusText[t.status]||t.status}</span><span class="badge pr-${t.priority}">${priorityText[t.priority]||t.priority}</span>${t.dueDate?`<span class="date ${overdue(t)?'hot':''}">${fmtDate(t.dueDate)}</span>`:''}</div><div class="buttons"><button class="btn" data-edit-task="${t.id}">Изменить</button>${!done&&t.status!=='done'?`<button class="btn ok" data-done-task="${t.id}">Готово</button>`:''}<button class="btn" data-ics-task="${t.id}">Календарь</button><button class="btn danger" data-del-task="${t.id}">Удалить</button></div></article>`}
function renderTasks(){const ts=tasks(),done=ts.filter(t=>t.status==='done'),list=ts.filter(taskPass);const completed=`<section class="completed-section"><button class="completed-link" id="toggleCompleted">${state.showCompleted?'▴':'▾'} Завершённые (${done.length})</button>${state.showCompleted?`<div class="list completed-list">${done.map(t=>taskCard(t,true)).join('')||'<div class="empty">Завершённых задач нет</div>'}</div>`:''}</section>`;page.innerHTML=`${renderFilters()}<div class="list">${list.map(t=>taskCard(t)).join('')||'<div class="empty">Нет задач</div>'}</div>${!state.projectId?`<div class="bottom-actions"><button class="btn" id="csvBtn">CSV</button><button class="btn" id="backupBtn">Резерв</button><button class="btn" id="restoreBtn">Восстановить</button></div>`:''}${completed}`}
function renderProjects(){const pts=load(LS.projectTasks).filter(valid);page.innerHTML=`<button class="btn primary" id="newProjectBtn" style="width:100%;margin-bottom:12px">Новый проект</button><input class="search" id="projectSearch" placeholder="Поиск проектов"><div class="list" id="projectsList"></div>`;const input=$('#projectSearch'),list=$('#projectsList');function draw(){const q=input.value.toLowerCase(),projects=load(LS.projects).filter(valid).filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q));projectsCount.textContent=projects.length;list.innerHTML=projects.map(p=>{const sub=pts.filter(t=>t.projectId===p.id),done=sub.filter(t=>t.status==='done').length,pr=sub.length?Math.round(done/sub.length*100):0;return`<article class="card project-card"><h3 data-open-project="${p.id}">${esc(p.title)}</h3><p class="extra">${esc(p.description||'')}</p><p class="meta">Задач: ${sub.length} · активных: ${sub.length-done}</p><div class="progress"><span style="width:${pr}%"></span></div><div class="buttons"><button class="btn" data-open-project="${p.id}">Открыть</button><button class="btn" data-edit-project="${p.id}">Изменить</button><button class="btn danger" data-del-project="${p.id}">Удалить</button></div></article>`}).join('')||'<div class="empty">Нет проектов</div>'}input.oninput=draw;draw()}
function renderNotes(){const notes=load(LS.notes).filter(valid);notesCount.textContent=notes.length;page.innerHTML=`<div class="list">${notes.map(n=>`<article class="card note-card" data-open-note="${n.id}"><h3>${esc(n.title||'Без заголовка')}</h3><p class="extra">${sanitize(n.body).replace(/<[^>]+>/g,' ').slice(0,160)||'Пустая заметка'}</p><div class="badges"><span class="badge status-new">Вложений: ${(n.attachments||[]).length}</span></div></article>`).join('')||'<div class="empty">Нет заметок</div>'}</div>`}
function openTask(t={}){state.editingTask=t;taskSheetTitle.textContent=t.id?'Редактирование задачи':'Новая задача';taskForm.innerHTML=`<div class="field"><label>Краткая суть задачи *</label><textarea name="title" required>${esc(t.title||'')}</textarea></div><div class="field"><label>Что требуется дополнительно</label><textarea name="extra">${esc(t.extra||'')}</textarea></div><div class="grid2"><div class="field"><label>Дата ответа</label><input type="date" name="dueDate" value="${esc(t.dueDate||'')}"></div><div class="field"><label>Напоминание</label><select name="reminder"><option value="0">Нет</option><option value="1">За 1 день</option><option value="2">За 2 дня</option><option value="3">За 3 дня</option><option value="7">За неделю</option></select></div></div><div class="grid2"><div class="field"><label>Значимость</label><select name="priority"><option value="normal">Обычная</option><option value="low">Низкая</option><option value="medium">Средняя</option><option value="high">Высокая</option></select></div><div class="field"><label>Статус</label><select name="status"><option value="new">Новая</option><option value="inwork">В работе</option><option value="waiting">Ожидание</option><option value="done">Завершена</option></select></div></div><div class="field"><label>Заметки</label><div class="editbox"><div class="editbar"><button type="button" class="tool" data-task-cmd="undo">↩</button><button type="button" class="tool" data-task-cmd="redo">↪</button><span class="sep"></span><button type="button" class="tool" data-task-cmd="bold">B</button><button type="button" class="tool" data-task-cmd="insertUnorderedList">•</button></div><div id="taskNotes" class="editable" contenteditable="true">${sanitize(t.notes||'')}</div></div></div><div class="sheet-actions"><button type="button" class="btn" id="cancelTask">Отмена</button><button class="btn primary">Сохранить</button></div>`;taskForm.reminder.value=t.reminder??0;taskForm.priority.value=t.priority||'normal';taskForm.status.value=t.status||'new';taskSheet.classList.add('show')}function saveTaskForm(e){e.preventDefault();const f=new FormData(taskForm),arr=tasks(),old=state.editingTask?.id&&arr.find(x=>x.id===state.editingTask.id);const obj={...(old||{}),id:old?.id||uid(),projectId:state.projectId||old?.projectId,title:f.get('title').trim(),extra:f.get('extra').trim(),dueDate:f.get('dueDate'),reminder:+f.get('reminder')||0,priority:f.get('priority'),status:f.get('status'),notes:sanitize(taskNotes.innerHTML),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);putTasks(arr);taskSheet.classList.remove('show');toastMsg('Сохранено');render()}
function openProject(p={}){state.editingProject=p;projectSheetTitle.textContent=p.id?'Редактирование проекта':'Новый проект';projectForm.innerHTML=`<div class="field"><label>Название проекта *</label><input name="title" required value="${esc(p.title||'')}"></div><div class="field"><label>Описание</label><textarea name="description">${esc(p.description||'')}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelProject">Отмена</button><button class="btn primary">Сохранить</button></div>`;projectSheet.classList.add('show')}function saveProjectForm(e){e.preventDefault();const f=new FormData(projectForm),arr=load(LS.projects).filter(valid),old=state.editingProject?.id&&arr.find(x=>x.id===state.editingProject.id);const obj={...(old||{}),id:old?.id||uid(),title:f.get('title').trim(),description:f.get('description').trim(),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.projects,arr);projectSheet.classList.remove('show');toastMsg('Проект сохранён');render()}
function openNote(n){state.note=n||{id:uid(),title:'',body:'',attachments:[],createdAt:now(),updatedAt:now()};noteTitle.value=state.note.title||'';noteBody.innerHTML=sanitize(state.note.body||'');renderAttachments();noteEditor.classList.add('show');setTimeout(()=>noteTitle.focus(),80)}function saveNote(){if(!state.note)return;const arr=load(LS.notes).filter(valid),old=arr.find(n=>n.id===state.note.id);state.note.title=noteTitle.value.trim();state.note.body=sanitize(noteBody.innerHTML);state.note.updatedAt=now();old?arr.splice(arr.indexOf(old),1,state.note):arr.push(state.note);save(LS.notes,arr);render();toastMsg('Заметка сохранена')}function renderAttachments(){attachments.innerHTML=(state.note?.attachments||[]).map(a=>`<div class="attachment"><span>${icon(a.type)}</span><a href="#" data-dl="${a.id}">${esc(a.name)}</a><small>${fmt(a.size)}</small><button class="btn danger" data-rm-att="${a.id}">×</button></div>`).join('')}function icon(t){return/pdf/.test(t)?'📄':/word/.test(t)?'📝':/excel|spreadsheet/.test(t)?'📊':/image/.test(t)?'📷':/video/.test(t)?'🎞️':/zip|rar|archive/.test(t)?'📁':'📎'}function fmt(b){return b<1024?b+' Б':b<1048576?(b/1024).toFixed(1)+' КБ':(b/1048576).toFixed(1)+' МБ'}
function download(name,data,type){const a=document.createElement('a'),u=URL.createObjectURL(data instanceof Blob?data:new Blob([data],{type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}function csvSafe(v){v=String(v??'');if(/^[=+\-@]/.test(v))v="'"+v;return'"'+v.replace(/"/g,'""')+'"'}function exportCsv(){const rows=[['title','extra','dueDate','reminder','priority','status'],...load(LS.tasks).filter(valid).map(t=>[t.title,t.extra,t.dueDate,t.reminder,t.priority,t.status])];download('tasks.csv',rows.map(r=>r.map(csvSafe).join(',')).join('\n'),'text/csv')}function backup(){download('lawyer-backup-v3.json',JSON.stringify({version:3,tasks:load(LS.tasks).filter(valid).map(t=>({summary:t.title,additionalInfo:t.extra,responseDate:t.dueDate,reminderDays:t.reminder,priority:t.priority,status:t.status==='inwork'?'in-progress':t.status==='done'?'completed':t.status,notes:t.notes})),projects:load(LS.projects).filter(valid),projectTasks:load(LS.projectTasks).filter(valid),notes:load(LS.notes).filter(valid)},null,2),'application/json')}function restore(file){if(!file)return;const r=new FileReader();r.onload=()=>{const d=JSON.parse(r.result);if(d.version===3&&d.tasks)save(LS.tasks,d.tasks.map(t=>({id:uid(),title:t.summary,extra:t.additionalInfo,dueDate:t.responseDate,reminder:t.reminderDays,priority:t.priority==='medium'?'normal':(t.priority||'normal'),status:t.status==='in-progress'?'inwork':t.status==='completed'?'done':t.status,notes:t.notes||'',createdAt:now(),updatedAt:now()})));['projects','projectTasks','notes'].forEach(k=>d[k]&&save(LS[k],d[k]));render();toastMsg('Данные восстановлены')};r.readAsText(file)}function makeIcs(t){const dt=(t.dueDate||new Date().toISOString().slice(0,10)).replaceAll('-','');download('task.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${t.title}\nDTSTART;VALUE=DATE:${dt}\nBEGIN:VALARM\nTRIGGER:-P${t.reminder||0}D\nACTION:DISPLAY\nDESCRIPTION:${t.title}\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`,'text/calendar')}function toastMsg(s){toast.textContent=s;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}function switchTab(next){state.tab=next;state.projectId=null;state.filter='active';state.showCompleted=false;render()}
seed();initAssets();render();document.getElementById('tabs').onclick=e=>{const b=e.target.closest('.tab');if(b)switchTab(b.dataset.tab)};backBtn.onclick=()=>{state.projectId=null;state.filter='active';state.showCompleted=false;render()};document.getElementById('fab').onclick=()=>state.tab==='projects'&&!state.projectId?openProject():state.tab==='notes'&&!state.projectId?openNote():openTask();page.onclick=e=>{const f=e.target.dataset.filter;if(f){state.filter=f;state.showCompleted=false;render()}if(e.target.id==='toggleCompleted'){state.showCompleted=!state.showCompleted;render()}if(e.target.id==='newProjectBtn'){openProject();return}let id=e.target.dataset.editTask;if(id)openTask(tasks().find(t=>t.id===id));id=e.target.dataset.doneTask;if(id){const arr=tasks(),t=arr.find(x=>x.id===id);t.status='done';t.updatedAt=now();putTasks(arr);render()}id=e.target.dataset.delTask;if(id&&confirm('Удалить задачу?')){putTasks(tasks().filter(t=>t.id!==id));render()}id=e.target.dataset.icsTask;if(id)makeIcs(tasks().find(t=>t.id===id));id=e.target.dataset.openProject;if(id){state.projectId=id;state.filter='active';state.showCompleted=false;render()}id=e.target.dataset.editProject;if(id)openProject(load(LS.projects).find(p=>p.id===id));id=e.target.dataset.delProject;if(id&&confirm('Удалить проект?')){save(LS.projects,load(LS.projects).filter(p=>p.id!==id));save(LS.projectTasks,load(LS.projectTasks).filter(t=>t.projectId!==id));render()}id=e.target.closest('[data-open-note]')?.dataset.openNote;if(id)openNote(load(LS.notes).find(n=>n.id===id));if(e.target.id==='csvBtn')exportCsv();if(e.target.id==='backupBtn')backup();if(e.target.id==='restoreBtn')restoreInput.click()};document.getElementById('taskForm').onsubmit=saveTaskForm;document.getElementById('projectForm').onsubmit=saveProjectForm;document.getElementById('restoreInput').onchange=()=>restore(document.getElementById('restoreInput').files[0]);document.addEventListener('click',e=>{if(e.target.id==='cancelTask')taskSheet.classList.remove('show');if(e.target.id==='cancelProject')projectSheet.classList.remove('show');if(e.target.classList.contains('overlay'))e.target.classList.remove('show');if(e.target.dataset.taskCmd){taskNotes.focus();document.execCommand(e.target.dataset.taskCmd,false,null)}});closeNote.onclick=()=>{saveNote();noteEditor.classList.remove('show')};saveNoteBtn.onclick=()=>{saveNote();noteEditor.classList.remove('show')};document.querySelectorAll('[data-note-cmd]').forEach(b=>b.onclick=()=>{noteBody.focus();document.execCommand(b.dataset.noteCmd,false,null)});attachBtn.onclick=e=>{e.stopPropagation();attachMenu.classList.toggle('show')};document.addEventListener('click',e=>{if(!attachBtn.contains(e.target)&&!attachMenu.contains(e.target))attachMenu.classList.remove('show')});attachMenu.onclick=e=>{if(e.target.dataset.accept){attachInput.accept=e.target.dataset.accept;attachInput.click()}};attachInput.onchange=()=>{const f=attachInput.files[0];if(!f)return;if(f.size>5*1024*1024)return alert('Максимальный размер файла — 5 МБ');const r=new FileReader();r.onload=()=>{state.note.attachments.push({id:uid(),name:f.name,type:f.type,size:f.size,data:r.result});renderAttachments();saveNote()};r.readAsDataURL(f)};attachments.onclick=e=>{const rm=e.target.dataset.rmAtt,dl=e.target.dataset.dl;if(rm){state.note.attachments=state.note.attachments.filter(a=>a.id!==rm);renderAttachments();saveNote()}if(dl){e.preventDefault();const a=state.note.attachments.find(x=>x.id===dl);fetch(a.data).then(r=>r.blob()).then(b=>download(a.name,b,a.type))}};if('serviceWorker'in navigator){const sw=`self.addEventListener('install',e=>e.waitUntil(caches.open('lawyer-pwa-v3').then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(x=>{let y=x.clone();caches.open('lawyer-pwa-v3').then(c=>c.put(e.request,y));return x}).catch(()=>caches.match('./')))))`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{})}
