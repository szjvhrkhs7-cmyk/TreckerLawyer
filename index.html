  <link rel="icon" type="image/svg+xml" href="app-icon.svg?v=20260710">

  <style>
    :root{color-scheme:light;--font:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;--bg:#fff;--text:#075E5E;--muted:#3D7F7F;--faint:#7BAFAF;--line:#D9F1F1;--line-strong:#C8E8E8;--accent:#008C8C;--accent-soft:#E7F8F8;--blue:#2477E5;--blue-soft:#EAF2FF;--orange:#D97706;--orange-soft:#FFF3E2;--purple:#7C3AED;--purple-soft:#F1EAFE;--green:#238B57;--green-soft:#E9F8EF;--red:#D92D20;--red-soft:#FDECEC;--radius-sm:14px;--radius-lg:24px;--shadow-sm:0 1px 2px rgba(0,140,140,.04),0 8px 24px rgba(0,140,140,.06);--shadow-md:0 20px 50px rgba(0,140,140,.12);--safe-bottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;margin:0;background:#fff}body{color:var(--text);font-family:var(--font);font-size:16px;line-height:1.42;letter-spacing:-.012em;padding:env(safe-area-inset-top) 0 calc(92px + var(--safe-bottom));-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;touch-action:manipulation}button,input,textarea,select{font:inherit;font-size:16px}button{border:0;background:none;color:inherit;cursor:pointer}.app{max-width:780px;margin:0 auto}.top{position:sticky;top:0;z-index:5;padding:18px 18px 0;background:rgba(255,255,255,.94);backdrop-filter:blur(22px) saturate(1.2);border-bottom:1px solid var(--line)}.navline{display:flex;align-items:center;gap:10px;min-width:0}.back{min-height:36px;padding:0 10px;margin-left:-10px;border-radius:999px;font-weight:700;color:var(--accent);white-space:nowrap}.back:active{background:var(--accent-soft)}.title{margin:0 0 8px;font-size:clamp(24px,5.3vw,34px);line-height:1.05;font-weight:700;letter-spacing:-.035em;color:var(--accent)}.stats{margin:0 0 16px;color:var(--muted);font-size:14px;font-weight:500}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:5px;margin:0 0 10px;border:1px solid var(--line);border-radius:999px;background:#fff;box-shadow:0 1px 0 rgba(0,140,140,.03) inset}.tab{min-height:42px;padding:0 8px;border-radius:999px;text-align:center;font-weight:700;color:var(--muted);transition:background .2s ease,color .2s ease,transform .15s ease}.tab.active{background:var(--accent);color:#fff}.tab:active{transform:scale(.985)}.count{display:inline-grid;place-items:center;min-width:22px;height:22px;margin-left:4px;padding:0 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:800;vertical-align:1px}.tab.active .count{background:rgba(255,255,255,.18);color:#fff}.page{padding:16px 18px 26px}.filters{display:flex;gap:8px;overflow:auto;padding:0 0 14px;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;min-height:38px;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:14px;font-weight:700;transition:.18s ease}.chip.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}.search{width:100%;height:52px;margin:0 0 14px;padding:0 16px;border:1px solid var(--line);border-radius:var(--radius-sm);outline:none;background:#fff;color:var(--text);box-shadow:0 1px 0 rgba(0,140,140,.03) inset}.search:focus,.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,140,140,.10)}.list{display:grid;gap:12px}.date-group{margin:0 0 24px}.date-group:last-child{margin-bottom:0}.date-group-title{margin:0 0 10px;padding:0 2px;color:var(--muted);font-size:13px;font-weight:800;letter-spacing:.02em;text-transform:uppercase}.status-group{margin:0 0 14px}.status-group:last-child{margin-bottom:0}.status-group-title{display:flex;align-items:center;gap:8px;margin:0 0 8px;padding:0 2px;font-size:14px;font-weight:800;color:var(--muted)}.status-dot{width:9px;height:9px;border-radius:50%;background:var(--status-color,var(--accent));box-shadow:0 0 0 4px color-mix(in srgb,var(--status-color,var(--accent)) 14%,transparent)}.card{position:relative;overflow:hidden;padding:17px 16px 16px 20px;border:1px solid var(--line);border-radius:var(--radius-lg);background:#fff;box-shadow:var(--shadow-sm);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}.card:active{transform:scale(.994)}.card:before{content:"";position:absolute;left:0;top:16px;bottom:16px;width:4px;border-radius:999px;background:var(--stripe,var(--accent))}.card h3{margin:0 0 8px;font-size:18px;line-height:1.25;font-weight:700;letter-spacing:-.02em;color:var(--text);overflow-wrap:anywhere;word-break:break-word}.extra{margin:0 0 12px;color:var(--muted);font-size:14px;line-height:1.45;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;max-width:100%}.note-preview{margin-bottom:0;display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;overflow:hidden}.badges,.buttons,.bottom-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.badges{margin:0 0 14px}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;letter-spacing:-.01em;background:var(--accent-soft);color:var(--accent)}.status-new{background:var(--blue-soft);color:var(--blue)}.status-inwork{background:var(--orange-soft);color:var(--orange)}.status-waiting{background:var(--purple-soft);color:var(--purple)}.status-done{background:var(--green-soft);color:var(--green)}.status-urgent{background:var(--red-soft);color:var(--red)}.pr-high{background:var(--red-soft);color:var(--red)}.pr-medium{background:var(--orange-soft);color:var(--orange)}.date{font-size:13px;color:var(--faint);font-weight:650}.date.hot{color:var(--red);font-weight:800}.btn{min-height:40px;padding:0 13px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--accent);font-size:14px;font-weight:750;display:inline-flex;align-items:center;justify-content:center;transition:transform .15s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease}.btn:active{transform:translateY(1px) scale(.99)}.btn.primary{border-color:transparent;background:var(--accent);color:#fff;box-shadow:0 12px 24px rgba(0,140,140,.18)}.btn.ok{border-color:var(--line);color:var(--green);background:var(--green-soft)}.btn.danger{border-color:var(--line);color:var(--red);background:var(--red-soft)}.bottom-actions{margin-top:22px}.completed-section{margin-top:18px;padding-top:10px;border-top:1px solid var(--line)}.completed-link{width:100%;min-height:44px;padding:0;color:var(--muted);text-align:left;font-size:15px;font-weight:750}.empty{padding:34px 16px;text-align:center;color:var(--faint);background:#fff;border:1px dashed var(--line-strong);border-radius:var(--radius-lg)}.fab{position:fixed;right:22px;bottom:calc(22px + var(--safe-bottom));z-index:12;width:62px;height:62px;border-radius:22px;background:var(--accent);color:#fff;font-size:34px;line-height:1;box-shadow:0 20px 42px rgba(0,140,140,.28);transition:transform .18s ease,box-shadow .18s ease}.fab:active{transform:scale(.94);box-shadow:0 12px 24px rgba(0,140,140,.24)}.project-card{padding-left:16px}.project-card:before{display:none}.project-card h3{cursor:pointer}.meta{color:var(--faint);font-size:14px;font-weight:600;margin:6px 0 13px}.progress{height:8px;background:var(--accent-soft);border-radius:999px;overflow:hidden;margin:8px 0 14px}.progress span{display:block;height:100%;background:var(--accent);border-radius:inherit;transition:width .35s ease}.swipe-row{position:relative;overflow:hidden;border-radius:var(--radius-lg);touch-action:pan-y}.swipe-action{position:absolute;inset:0 0 0 auto;width:96px;display:flex;align-items:stretch;justify-content:stretch;background:var(--red);border-radius:0 var(--radius-lg) var(--radius-lg) 0}.swipe-delete{width:100%;color:#fff;font-size:14px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.swipe-delete:before{content:"⌫";font-size:23px;line-height:1}.note-card{position:relative;z-index:1;padding-left:16px;will-change:transform;transition:transform .24s cubic-bezier(.2,.8,.2,1);cursor:pointer}.note-card:before{display:none}.note-card.swiping{transition:none}.undo-toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-bottom));z-index:50;transform:translate(-50%,18px);display:flex;align-items:center;gap:14px;max-width:calc(100% - 32px);padding:12px 14px;border-radius:16px;background:#153F3F;color:#fff;box-shadow:0 16px 40px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:.22s ease}.undo-toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}.undo-toast button{color:#8FF0E8;font-weight:800}.overlay{position:fixed;inset:0;z-index:30;background:rgba(0,140,140,.18);backdrop-filter:blur(8px);display:none;align-items:flex-end}.overlay.show{display:flex}.sheet{width:100%;max-height:88vh;overflow:auto;background:#fff;border:1px solid var(--line);border-bottom:0;border-radius:28px 28px 0 0;padding:12px 18px calc(26px + var(--safe-bottom));box-shadow:var(--shadow-md);animation:sheetIn .24s cubic-bezier(.2,.8,.2,1)}@keyframes sheetIn{from{transform:translateY(18px);opacity:.4}to{transform:none;opacity:1}}.grab{width:46px;height:5px;border-radius:99px;background:var(--line-strong);margin:4px auto 18px}.sheet h2{font-size:22px;letter-spacing:-.025em;margin:0 0 18px;color:var(--accent)}.form{display:grid;gap:15px}.field{display:grid;gap:8px}.field label{font-size:13px;font-weight:800;color:var(--muted)}.field input,.field textarea,.field select{width:100%;min-height:52px;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;color:var(--text);padding:13px 14px;outline:none;-webkit-appearance:none}.field textarea{min-height:96px;resize:none;line-height:1.45;overflow:hidden}.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none!important}@media(max-width:390px){.top,.page{padding-left:14px;padding-right:14px}.grid2{grid-template-columns:1fr}.tab{font-size:14px}.btn{font-size:13px;padding:0 11px}.fab{right:16px;width:58px;height:58px}.swipe-action{width:88px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div id="navline" class="navline hidden"><button class="back" id="backBtn">← Назад</button><h1 class="title" id="contextTitle"></h1></div>
      <h1 id="mainTitle" class="title">Задачи юриста</h1>
      <p class="stats" id="stats"></p>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="tasks">Задачи <span class="count" id="tasksCount">0</span></button>
        <button class="tab" data-tab="projects">Проекты <span class="count" id="projectsCount">0</span></button>
        <button class="tab" data-tab="notes">Заметки <span class="count" id="notesCount">0</span></button>
      </nav>
    </header>
    <section class="page" id="page"></section>
  </main>
  <button class="fab" id="fab" aria-label="Добавить">+</button>
  <section class="overlay" id="taskSheet"><div class="sheet"><div class="grab"></div><h2 id="taskSheetTitle">Задача</h2><form id="taskForm" class="form"></form></div></section>
  <section class="overlay" id="projectSheet"><div class="sheet"><div class="grab"></div><h2 id="projectSheetTitle">Проект</h2><form id="projectForm" class="form"></form></div></section>
  <section class="overlay" id="noteSheet"><div class="sheet"><div class="grab"></div><h2 id="noteSheetTitle">Заметка</h2><form id="noteForm" class="form"></form></div></section>
  <div class="undo-toast" id="undoToast"><span>Заметка удалена</span><button id="undoDelete">Отменить</button></div>
  <input id="restoreInput" type="file" accept="application/json" hidden>
<script>
const APP_TITLE='Задачи юриста';
const A='#008C8C';
const LS={tasks:'lawyerTasks',projects:'lawyerProjects',projectTasks:'lawyerProjectTasks',notes:'lawyerNotes'};
const statusText={new:'Новая',inwork:'В работе','in-progress':'В работе',waiting:'Ожидание',done:'Завершена',completed:'Завершена'};
const priorityText={none:'Обычная',low:'Низкая',normal:'Обычная',medium:'Средняя',high:'Высокая'};
const statusColor={new:'#2477E5',inwork:'#D97706',waiting:'#7C3AED',done:'#238B57'};
const statusOrder=['new','inwork','waiting','done'];
let state={tab:'tasks',filter:'active',projectId:null,editingTask:null,editingProject:null,editingNote:null,showCompleted:false};
let deletedNote=null,undoTimer=null;
const $=s=>document.querySelector(s);
const uid=()=>String(Date.now()+Math.floor(Math.random()*999));
const now=()=>new Date().toISOString();
function load(k){try{const v=JSON.parse(localStorage.getItem(k)||'[]');return Array.isArray(v)?v:[]}catch(e){console.warn('storage read error',k,e);return []}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){alert('Не удалось сохранить данные. Проверьте свободное место в браузере.')}}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function stripHtml(v){const d=document.createElement('div');d.innerHTML=String(v||'');return d.textContent||d.innerText||''}
function cleanNotePreview(v){return stripHtml(v||'').replace(/\s+/g,' ').replace(/(https?:\/\/)/g,'\n$1').replace(/^\n/,'').trim()}
function fmtDate(v){return v?new Date(v+'T00:00:00').toLocaleDateString('ru-RU'):''}
function fmtCreated(v){return new Date(v).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}
function normalStatus(s){return s==='completed'?'done':s==='in-progress'?'inwork':(s||'new')}
function valid(o){return o&&o.id}
function autoGrow(el){if(!el)return;el.style.height='auto';el.style.height=Math.max(el.scrollHeight,96)+'px'}
function bindAutoGrow(root=document){root.querySelectorAll('textarea').forEach(el=>{if(!el.dataset.autogrowBound){el.dataset.autogrowBound='1';el.addEventListener('input',()=>autoGrow(el))}requestAnimationFrame(()=>autoGrow(el))})}
function inferredCreatedAt(t){if(t.createdAt&&!Number.isNaN(Date.parse(t.createdAt)))return t.createdAt;const n=Number(String(t.id||'').slice(0,13));return Number.isFinite(n)&&n>1e12?new Date(n).toISOString():now()}
function createdKey(t){return inferredCreatedAt(t).slice(0,10)}
function normTask(t){return {...t,status:normalStatus(t.status),priority:t.priority||'normal',title:t.title||t.summary||'',extra:t.extra||t.additionalInfo||'',dueDate:t.dueDate||t.responseDate||'',reminder:+(t.reminder??t.reminderDays)||0,notes:t.notes||'',createdAt:inferredCreatedAt(t)}}
function allProjects(){return load(LS.projects).filter(valid).map(p=>({...p,title:p.title||p.name||'',description:p.description||''}))}
function allNotes(){return load(LS.notes).filter(valid)}
function tasks(){const arr=load(state.projectId?LS.projectTasks:LS.tasks).filter(valid).map(normTask);return state.projectId?arr.filter(t=>t.projectId===state.projectId):arr}
function putTasks(arr){if(state.projectId){const rest=load(LS.projectTasks).filter(t=>t.projectId!==state.projectId);save(LS.projectTasks,[...rest,...arr])}else save(LS.tasks,arr)}
function counts(){return{tasks:load(LS.tasks).filter(t=>valid(t)&&normalStatus(t.status)!=='done').length,projects:allProjects().length,notes:allNotes().length}}
function statsLine(){const ts=tasks();return `${ts.filter(t=>t.status==='inwork').length} в работе · ${ts.filter(overdue).length} просрочено · ${ts.filter(t=>t.status==='done').length} завершено`}
function overdue(t){return t.dueDate&&t.status!=='done'&&new Date(t.dueDate+'T23:59:59')<new Date()}
function urgent(t){return t.priority==='high'||overdue(t)}
function updateHeader(){const c=counts(),project=allProjects().find(p=>p.id===state.projectId);tasksCount.textContent=c.tasks;projectsCount.textContent=c.projects;notesCount.textContent=c.notes;stats.textContent=statsLine();navline.classList.toggle('hidden',!project);tabs.classList.toggle('hidden',!!project);mainTitle.classList.toggle('hidden',!!project);mainTitle.textContent=APP_TITLE;document.title=APP_TITLE;if(project)contextTitle.textContent=project.title;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab))}
function render(){updateHeader();page.innerHTML='';if(state.projectId||state.tab==='tasks')renderTasks();else if(state.tab==='projects')renderProjects();else renderNotes();bindAutoGrow(page)}
function renderFilters(){return `<div class="filters"><button class="chip ${state.filter==='active'?'active':''}" data-filter="active">Все активные</button><button class="chip ${state.filter==='new'?'active':''}" data-filter="new">Новые</button><button class="chip ${state.filter==='inwork'?'active':''}" data-filter="inwork">В работе</button><button class="chip ${state.filter==='waiting'?'active':''}" data-filter="waiting">Ожидание</button></div>`}
function taskPass(t){return state.filter==='active'?t.status!=='done':t.status===state.filter}
function taskCard(t,done=false){const isUrgent=urgent(t),statusClass=isUrgent?'status-urgent':`status-${t.status}`,stripe=isUrgent?'#D92D20':statusColor[t.status]||A;return `<article class="card" style="--stripe:${stripe}"><h3>${esc(t.title)}</h3>${t.extra?`<p class="extra">${esc(t.extra)}</p>`:''}<div class="badges"><span class="badge ${statusClass}">${isUrgent?'Важно / срочно':statusText[t.status]||t.status}</span><span class="badge pr-${t.priority}">${priorityText[t.priority]||t.priority}</span>${t.dueDate?`<span class="date ${overdue(t)?'hot':''}">${fmtDate(t.dueDate)}</span>`:''}</div><div class="buttons"><button class="btn" data-edit-task="${t.id}">Изменить</button>${!done&&t.status!=='done'?`<button class="btn ok" data-done-task="${t.id}">Готово</button>`:''}<button class="btn" data-ics-task="${t.id}">Календарь</button><button class="btn danger" data-del-task="${t.id}">Удалить</button></div></article>`}
function groupedTasksHtml(list){if(!list.length)return '<div class="empty">Нет задач</div>';const byDate=new Map();[...list].sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).forEach(t=>{const key=createdKey(t);if(!byDate.has(key))byDate.set(key,[]);byDate.get(key).push(t)});return [...byDate.entries()].map(([date,items])=>{const byStatus=new Map(statusOrder.map(s=>[s,[]]));items.forEach(t=>byStatus.get(t.status)?.push(t));const statuses=[...byStatus.entries()].filter(([,arr])=>arr.length).map(([status,arr])=>`<section class="status-group"><h3 class="status-group-title" style="--status-color:${arr.some(urgent)?'#D92D20':statusColor[status]}"><span class="status-dot"></span>${arr.some(urgent)?'Важные и срочные':statusText[status]} · ${arr.length}</h3><div class="list">${arr.map(t=>taskCard(t,status==='done')).join('')}</div></section>`).join('');return `<section class="date-group"><h2 class="date-group-title">${fmtCreated(date+'T12:00:00')}</h2>${statuses}</section>`}).join('')}
function renderTasks(){const ts=tasks(),done=ts.filter(t=>t.status==='done'),list=ts.filter(taskPass);page.innerHTML=`${renderFilters()}${groupedTasksHtml(list)}${!state.projectId?`<div class="bottom-actions"><button class="btn" id="csvBtn">CSV</button><button class="btn" id="backupBtn">Резерв</button><button class="btn" id="restoreBtn">Восстановить</button></div>`:''}<section class="completed-section"><button class="completed-link" id="toggleCompleted">${state.showCompleted?'▴':'▾'} Завершённые (${done.length})</button>${state.showCompleted?groupedTasksHtml(done):''}</section>`}
function renderProjects(){const pts=load(LS.projectTasks).filter(valid).map(normTask);page.innerHTML=`<input class="search" id="projectSearch" placeholder="Поиск проектов"><div class="list" id="projectsList"></div>`;const input=$('#projectSearch'),list=$('#projectsList');function draw(){const q=input.value.toLowerCase();const projects=allProjects().filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q));projectsCount.textContent=projects.length;list.innerHTML=projects.map(p=>{const sub=pts.filter(t=>t.projectId===p.id),done=sub.filter(t=>t.status==='done').length,pr=sub.length?Math.round(done/sub.length*100):0;return `<article class="card project-card"><h3 data-open-project="${p.id}">${esc(p.title)}</h3><p class="extra">${esc(p.description||'')}</p><p class="meta">Задач: ${sub.length} · активных: ${sub.length-done}</p><div class="progress"><span style="width:${pr}%"></span></div><div class="buttons"><button class="btn" data-open-project="${p.id}">Открыть</button><button class="btn" data-edit-project="${p.id}">Изменить</button><button class="btn danger" data-del-project="${p.id}">Удалить</button></div></article>`}).join('')||'<div class="empty">Нет проектов. Нажмите «+», чтобы создать первый.</div>'}input.oninput=draw;draw()}
function renderNotes(){const notes=allNotes().sort((a,b)=>(b.updatedAt||b.createdAt||'').localeCompare(a.updatedAt||a.createdAt||''));page.innerHTML=`<div class="list">${notes.map(n=>{const preview=cleanNotePreview(n.body).slice(0,700);return `<div class="swipe-row" data-note-row="${n.id}"><div class="swipe-action"><button class="swipe-delete" data-delete-note="${n.id}" aria-label="Удалить заметку">Удалить</button></div><article class="card note-card" data-open-note="${n.id}"><h3>${esc(n.title||'Без заголовка')}</h3><p class="extra note-preview">${esc(preview)||'Пустая заметка'}</p></article></div>`}).join('')||'<div class="empty">Нет заметок</div>'}</div>`;bindNoteSwipe()}
function bindNoteSwipe(){let openRow=null;document.querySelectorAll('.swipe-row').forEach(row=>{const card=row.querySelector('.note-card');let startX=0,startY=0,startOffset=0,current=0,dragging=false,moved=false;const set=x=>{current=Math.max(-96,Math.min(0,x));card.style.transform=`translateX(${current}px)`};card.addEventListener('pointerdown',e=>{if(openRow&&openRow!==row){const other=openRow.querySelector('.note-card');other.style.transform='translateX(0)';openRow=null}dragging=true;moved=false;startX=e.clientX;startY=e.clientY;startOffset=current;card.classList.add('swiping');card.setPointerCapture?.(e.pointerId)});card.addEventListener('pointermove',e=>{if(!dragging)return;const dx=e.clientX-startX,dy=e.clientY-startY;if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>8){dragging=false;card.classList.remove('swiping');set(startOffset);return}if(Math.abs(dx)>5)moved=true;set(startOffset+dx)});const finish=()=>{if(!dragging)return;dragging=false;card.classList.remove('swiping');if(current<-42){set(-96);openRow=row}else{set(0);if(openRow===row)openRow=null}setTimeout(()=>{card.dataset.swipeMoved=moved?'1':'0'},0)};card.addEventListener('pointerup',finish);card.addEventListener('pointercancel',finish);card.addEventListener('click',e=>{if(card.dataset.swipeMoved==='1'){e.preventDefault();e.stopPropagation();card.dataset.swipeMoved='0'}})})}
function deleteNote(id){const arr=allNotes(),idx=arr.findIndex(n=>n.id===id);if(idx<0)return;deletedNote={note:arr[idx],index:idx};arr.splice(idx,1);save(LS.notes,arr);render();clearTimeout(undoTimer);undoToast.classList.add('show');undoTimer=setTimeout(()=>{deletedNote=null;undoToast.classList.remove('show')},4000)}
function undoNoteDelete(){if(!deletedNote)return;const arr=allNotes();arr.splice(Math.min(deletedNote.index,arr.length),0,deletedNote.note);save(LS.notes,arr);deletedNote=null;clearTimeout(undoTimer);undoToast.classList.remove('show');render()}
function openTask(t={}){state.editingTask=t;taskSheetTitle.textContent=t.id?'Редактирование задачи':'Новая задача';taskForm.innerHTML=`<div class="field"><label>Краткая суть задачи *</label><textarea name="title" required>${esc(t.title||'')}</textarea></div><div class="field"><label>Что требуется дополнительно</label><textarea name="extra">${esc(t.extra||'')}</textarea></div><div class="grid2"><div class="field"><label>Дата ответа</label><input type="date" name="dueDate" value="${esc(t.dueDate||'')}"></div><div class="field"><label>Напоминание</label><select name="reminder"><option value="0">Нет</option><option value="1">За 1 день</option><option value="2">За 2 дня</option><option value="3">За 3 дня</option><option value="7">За неделю</option></select></div></div><div class="grid2"><div class="field"><label>Значимость</label><select name="priority"><option value="normal">Обычная</option><option value="low">Низкая</option><option value="medium">Средняя</option><option value="high">Высокая / срочная</option></select></div><div class="field"><label>Статус</label><select name="status"><option value="new">Новая</option><option value="inwork">В работе</option><option value="waiting">Ожидание</option><option value="done">Завершена</option></select></div></div><div class="field"><label>Заметки</label><textarea name="notes" data-autogrow="true">${esc(stripHtml(t.notes||''))}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelTask">Отмена</button><button class="btn primary">Сохранить</button></div>`;taskForm.reminder.value=t.reminder??0;taskForm.priority.value=t.priority||'normal';taskForm.status.value=t.status||'new';taskSheet.classList.add('show');bindAutoGrow(taskForm)}
function saveTaskForm(e){e.preventDefault();const f=new FormData(taskForm),arr=tasks(),old=state.editingTask?.id&&arr.find(x=>x.id===state.editingTask.id),title=(f.get('title')||'').trim();if(!title){alert('Укажите краткую суть задачи');return}const obj={...(old||{}),id:old?.id||uid(),projectId:state.projectId||old?.projectId,title,extra:(f.get('extra')||'').trim(),dueDate:f.get('dueDate'),reminder:+f.get('reminder')||0,priority:f.get('priority'),status:f.get('status'),notes:f.get('notes')||'',createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);putTasks(arr);taskSheet.classList.remove('show');render()}
function openProject(p={}){state.editingProject=p;projectSheetTitle.textContent=p.id?'Редактирование проекта':'Новый проект';projectForm.innerHTML=`<div class="field"><label>Название проекта *</label><input name="title" required value="${esc(p.title||'')}"></div><div class="field"><label>Описание</label><textarea name="description">${esc(p.description||'')}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelProject">Отмена</button><button class="btn primary">Сохранить</button></div>`;projectSheet.classList.add('show');bindAutoGrow(projectForm)}
function saveProjectForm(e){e.preventDefault();const f=new FormData(projectForm),arr=allProjects(),old=state.editingProject?.id&&arr.find(x=>x.id===state.editingProject.id),title=(f.get('title')||'').trim();if(!title){alert('Укажите название проекта');return}const obj={...(old||{}),id:old?.id||uid(),title,description:(f.get('description')||'').trim(),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.projects,arr);projectSheet.classList.remove('show');render()}
function openNote(n={}){state.editingNote=n;noteSheetTitle.textContent=n.id?'Редактирование заметки':'Новая заметка';noteForm.innerHTML=`<div class="field"><label>Заголовок</label><input name="title" value="${esc(n.title||'')}"></div><div class="field"><label>Текст</label><textarea name="body" style="min-height:220px" data-autogrow="true">${esc(stripHtml(n.body||''))}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelNote">Отмена</button><button class="btn primary">Сохранить</button></div>`;noteSheet.classList.add('show');bindAutoGrow(noteForm)}
function saveNoteForm(e){e.preventDefault();const f=new FormData(noteForm),arr=allNotes(),old=state.editingNote?.id&&arr.find(x=>x.id===state.editingNote.id);const obj={...(old||{}),id:old?.id||uid(),title:(f.get('title')||'').trim(),body:f.get('body')||'',attachments:old?.attachments||[],createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.notes,arr);noteSheet.classList.remove('show');render()}
function download(name,data,type){const a=document.createElement('a'),u=URL.createObjectURL(data instanceof Blob?data:new Blob([data],{type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
function csvSafe(v){v=String(v??'');if(/^[=+\-@]/.test(v))v="'"+v;return '"'+v.replace(/"/g,'""')+'"'}
function exportCsv(){const rows=[['title','extra','dueDate','reminder','priority','status'],...load(LS.tasks).filter(valid).map(normTask).map(t=>[t.title,t.extra,t.dueDate,t.reminder,t.priority,t.status])];download('tasks.csv',rows.map(r=>r.map(csvSafe).join(',')).join('\n'),'text/csv')}
function backup(){download('lawyer-backup.json',JSON.stringify({version:6,tasks:load(LS.tasks),projects:load(LS.projects),projectTasks:load(LS.projectTasks),notes:load(LS.notes)},null,2),'application/json')}
function restore(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);['tasks','projects','projectTasks','notes'].forEach(k=>Array.isArray(d[k])&&save(LS[k],d[k]));render()}catch{alert('Не удалось прочитать файл резервной копии')}};r.readAsText(file)}
function makeIcs(t){const dt=(t?.dueDate||new Date().toISOString().slice(0,10)).replaceAll('-','');download('task.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${t?.title||'Задача'}\nDTSTART;VALUE=DATE:${dt}\nEND:VEVENT\nEND:VCALENDAR`,'text/calendar')}
function switchTab(tab){state={...state,tab,projectId:null,filter:'active',showCompleted:false};render()}
tabs.onclick=e=>{const b=e.target.closest('.tab');if(b)switchTab(b.dataset.tab)};
backBtn.onclick=()=>{state.projectId=null;state.filter='active';state.showCompleted=false;render()};
fab.onclick=()=>state.tab==='projects'&&!state.projectId?openProject():state.tab==='notes'&&!state.projectId?openNote():openTask();
page.onclick=e=>{let id;if(e.target.dataset.filter){state.filter=e.target.dataset.filter;state.showCompleted=false;render()}if(e.target.id==='toggleCompleted'){state.showCompleted=!state.showCompleted;render()}id=e.target.dataset.editTask;if(id)openTask(tasks().find(t=>t.id===id));id=e.target.dataset.doneTask;if(id){const arr=tasks(),t=arr.find(x=>x.id===id);if(t){t.status='done';t.updatedAt=now();putTasks(arr);render()}}id=e.target.dataset.delTask;if(id&&confirm('Удалить задачу?')){putTasks(tasks().filter(t=>t.id!==id));render()}id=e.target.dataset.icsTask;if(id)makeIcs(tasks().find(t=>t.id===id));id=e.target.dataset.openProject;if(id){state.projectId=id;state.filter='active';state.showCompleted=false;render()}id=e.target.dataset.editProject;if(id)openProject(allProjects().find(p=>p.id===id));id=e.target.dataset.delProject;if(id&&confirm('Удалить проект и его задачи?')){save(LS.projects,allProjects().filter(p=>p.id!==id));save(LS.projectTasks,load(LS.projectTasks).filter(t=>t.projectId!==id));render()}id=e.target.dataset.deleteNote;if(id){e.stopPropagation();deleteNote(id);return}id=e.target.closest('[data-open-note]')?.dataset.openNote;if(id&&!e.target.closest('.swipe-action'))openNote(allNotes().find(n=>n.id===id));if(e.target.id==='csvBtn')exportCsv();if(e.target.id==='backupBtn')backup();if(e.target.id==='restoreBtn')restoreInput.click()};
undoDelete.onclick=undoNoteDelete;
taskForm.onsubmit=saveTaskForm;projectForm.onsubmit=saveProjectForm;noteForm.onsubmit=saveNoteForm;restoreInput.onchange=()=>restore(restoreInput.files[0]);
document.addEventListener('click',e=>{if(e.target.id==='cancelTask')taskSheet.classList.remove('show');if(e.target.id==='cancelProject')projectSheet.classList.remove('show');if(e.target.id==='cancelNote')noteSheet.classList.remove('show');if(e.target.classList.contains('overlay'))e.target.classList.remove('show')});
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{})}
render();
</script>
</body>
