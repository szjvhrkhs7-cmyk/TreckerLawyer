<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Задачи юриста">
  <meta name="theme-color" content="#0D9488">
  <title>Задачи юриста</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link id="manifestLink" rel="manifest">
  <link id="faviconLink" rel="icon" type="image/svg+xml">
  <link id="appleIconLink" rel="apple-touch-icon">
  <style>
    :root{--accent:#0D9488;--accent-soft:#E6F5F3;--accent-dark:#065F56;--text:#30302f;--muted:#7b7b78;--line:#e5e2de;--card:#fff;--danger:#ef4444;--warn:#e87800;--green:#3fa65b;--shadow:0 14px 32px rgba(13,148,136,.18);--soft-shadow:0 8px 24px rgba(24,39,75,.06);--safe-bottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;margin:0;background:#fff;color:var(--text);font-family:Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{padding:env(safe-area-inset-top) 0 calc(78px + var(--safe-bottom));font-size:16px;line-height:1.35}
    button,input,textarea,select{font:inherit;font-size:16px}
    button{cursor:pointer;border:0;background:none;color:inherit}
    .app{max-width:760px;margin:0 auto}
    .top{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.98);backdrop-filter:blur(18px);padding:18px 20px 0;border-bottom:1px solid var(--line)}
    .top.compact{padding-top:16px}
    .navline{display:flex;align-items:center;gap:10px;min-width:0}
    .back{font-weight:700;color:var(--accent);font-size:16px;white-space:nowrap}
    .title{font-size:26px;line-height:1.16;margin:0 0 6px;font-weight:700;letter-spacing:-.025em;color:#2f2f2d}
    .top.compact .title{font-size:24px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .stats{color:var(--muted);font-size:15px;line-height:1.3;margin:0 0 20px}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);align-items:end;gap:6px}
    .tab{position:relative;text-align:center;padding:8px 4px 15px;font-size:17px;font-weight:700;color:#777;line-height:1.2}
    .tab.active{color:var(--accent)}
    .tab.active:after{content:"";position:absolute;left:20%;right:20%;bottom:0;height:3px;border-radius:99px;background:var(--accent)}
    .count{display:inline-grid;place-items:center;min-width:22px;height:22px;margin-left:5px;padding:0 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:700;vertical-align:1px}
    .page{padding:12px 20px 22px}
    .filters{display:flex;gap:8px;overflow:auto;padding:0 0 12px;margin:0 -1px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto;border:1px solid var(--line);background:#fbfbfa;color:#777;border-radius:10px;padding:9px 15px;font-weight:700;font-size:15px;line-height:1.15;box-shadow:inset 0 0 0 1px rgba(0,0,0,.01)}
    .chip.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
    .search{width:100%;height:54px;border:1px solid var(--line);border-radius:12px;padding:0 16px;color:var(--text);outline:none;font-size:17px;margin:4px 0 14px;background:#fff;box-shadow:0 1px 0 rgba(0,0,0,.02)}
    .search::placeholder{color:#b7b5b1}
    .list{display:grid;gap:12px}
    .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 16px 16px 22px;overflow:hidden;box-shadow:var(--soft-shadow)}
    .card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--stripe,#bdbdbd)}
    .card h3{margin:0 0 8px;font-size:19px;line-height:1.28;font-weight:700;letter-spacing:-.018em;color:#30302f}
    .card .extra{margin:0 0 11px;color:#777;font-size:15px;line-height:1.35}
    .badges{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin:0 0 13px}
    .badge{border-radius:7px;padding:5px 9px;font-size:14px;font-weight:700;line-height:1.05}
    .badge.status-new,.badge.pr-normal{background:var(--accent-soft);color:var(--accent)}
    .badge.status-inwork{background:#ffe6d4;color:var(--warn)}
    .badge.status-waiting{background:#f2ecff;color:#7c3aed}
    .badge.status-done{background:#e8f7e9;color:#62b76d}
    .badge.pr-low{background:#f5f5f5;color:#aaa}
    .badge.pr-medium{background:#ffe7ce;color:var(--warn)}
    .badge.pr-high{background:#ffe5e8;color:var(--danger)}
    .date{font-size:14px;color:#858585;line-height:1.05}
    .date.hot{color:var(--danger);font-weight:700}
    .buttons{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{min-height:42px;padding:0 14px;border:1px solid var(--line);border-radius:10px;background:#fbfbfa;font-size:15px;font-weight:700;color:#333;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .btn.ok{border-color:var(--green);color:var(--green);background:#fff}
    .btn.danger{border-color:var(--danger);color:var(--danger);background:#fff}
    .btn.primary{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 8px 18px rgba(13,148,136,.18)}
    .bottom-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:32px}
    .bottom-actions .btn{min-height:46px}
    .fab{position:fixed;right:24px;bottom:calc(24px + var(--safe-bottom));z-index:11;width:64px;height:64px;border-radius:50%;background:var(--accent);color:#fff;font-size:34px;font-weight:500;box-shadow:var(--shadow)}
    .empty{padding:28px 10px;color:#999;text-align:center;font-size:16px}
    .project-card,.notes-card{padding-left:18px}
    .project-card:before,.notes-card:before{display:none}
    .project-card h3{font-size:20px}
    .project-card .meta{color:#aaa;font-size:15px;margin:6px 0 14px}
    .completed-link{width:100%;text-align:left;padding:10px 0 14px;color:#777;font-size:18px;font-weight:700}
    .completed-link span{font-size:14px;margin-right:6px}
    .completed-section{margin-top:18px;padding-top:8px}
    .completed-list{margin-top:8px}
    .overlay{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.36);display:none;align-items:flex-end}
    .overlay.show{display:flex}
    .sheet{width:100%;max-height:84vh;overflow:auto;background:#fff;border-radius:20px 20px 0 0;padding:12px 22px calc(24px + var(--safe-bottom));box-shadow:0 -18px 48px rgba(0,0,0,.18)}
    .grab{width:52px;height:6px;border-radius:99px;background:#dfddda;margin:4px auto 22px}
    .sheet h2{font-size:24px;line-height:1.2;margin:0 0 22px;letter-spacing:-.02em}
    .form{display:grid;gap:16px}
    .field{display:grid;gap:8px}
    .field label{font-size:16px;font-weight:700;color:#777}
    .field input,.field textarea,.field select,.editable{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;min-height:52px;padding:14px 16px;outline:none;color:#333;-webkit-appearance:none;box-shadow:0 1px 0 rgba(0,0,0,.02)}
    .field textarea{min-height:78px;resize:vertical}
    .grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
    .select-wrap{position:relative;display:block}
    .select-wrap:after{content:"⌄";position:absolute;right:14px;top:50%;transform:translateY(-56%);font-size:25px;color:#777;pointer-events:none}
    .select-wrap select{padding-right:42px}
    .editbox{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 1px 0 rgba(0,0,0,.02)}
    .editbar{display:flex;gap:4px;align-items:center;border-bottom:1px solid var(--line);padding:9px 10px;background:#fff;overflow:auto}
    .tool{height:38px;min-width:42px;border-radius:9px;font-size:16px;font-weight:700;white-space:nowrap}
    .tool:hover{background:#f5f5f5}
    .sep{height:28px;width:1px;background:#e9e6e1;margin:0 5px;flex:0 0 auto}
    .editable{border:0;border-radius:0;min-height:150px;line-height:1.45;font-size:16px;box-shadow:none}
    .sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
    .full-editor{position:fixed;inset:0;z-index:40;background:#fff;display:none;padding-top:env(safe-area-inset-top)}
    .full-editor.show{display:block}
    .editor-top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line);font-size:17px;font-weight:700}
    .editor-top button{color:var(--accent);font-weight:700}
    .note-title{width:100%;border:0;border-bottom:1px solid var(--line);height:64px;padding:0 20px;font-size:26px;font-weight:700;outline:none;color:#333;letter-spacing:-.02em}
    .note-title::placeholder{color:#b7b7b7}
    .note-editbar{height:58px;border-bottom:1px solid #f0eeeb;border-top:1px solid #f0eeeb;display:flex;align-items:center;padding:0 16px;gap:8px;overflow:auto}
    .note-body{min-height:calc(100vh - 186px);padding:22px 20px;font-size:18px;line-height:1.45;outline:none;color:#333}
    .note-body:empty:before{content:attr(data-placeholder);color:#b7b7b7}
    .attach-menu{position:fixed;top:calc(134px + env(safe-area-inset-top));right:20px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 26px rgba(0,0,0,.14);padding:8px;display:none;z-index:45}
    .attach-menu.show{display:grid}
    .attach-menu button{padding:10px 18px;text-align:left;color:var(--accent);font-weight:700}
    .attachments{display:grid;gap:8px;padding:0 20px}
    .attachment{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:9px;font-size:14px}
    .attachment a{color:var(--accent);font-weight:700;text-decoration:none;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .toast{position:fixed;left:50%;bottom:calc(24px + var(--safe-bottom));transform:translateX(-50%);z-index:60;background:rgba(45,45,45,.92);color:#fff;border-radius:999px;padding:12px 18px;font-size:14px;display:none}
    .toast.show{display:block}
    .hidden{display:none!important}
    @media(max-width:560px){.app{max-width:none}.top{padding-left:18px;padding-right:18px}.page{padding-left:18px;padding-right:18px}.title{font-size:25px}.stats{font-size:15px}.tab{font-size:16px}.chip{font-size:15px;padding:9px 13px}.card h3{font-size:18px}.sheet{padding-left:18px;padding-right:18px}.fab{right:20px;bottom:calc(22px + var(--safe-bottom))}}
    @media(max-width:390px){.page,.top{padding-left:14px;padding-right:14px}.grid2{grid-template-columns:1fr}.btn{font-size:14px;padding:0 12px}.fab{right:16px;width:58px;height:58px;font-size:30px}.tabs{gap:2px}.tab{font-size:15px}.count{min-width:20px;height:20px;font-size:12px}}
  </style>
</head>
<body>
  <main class="app">
    <header id="top" class="top">
      <div id="navline" class="navline hidden"><button class="back" id="backBtn">← Назад</button><h1 class="title" id="contextTitle"></h1></div>
      <h1 id="mainTitle" class="title">Задачи юриста</h1>
      <p class="stats" id="stats"></p>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="tasks">Задачи <span class="count" id="tasksCount">0</span></button>
        <button class="tab" data-tab="projects">Проекты <span class="count" id="projectsCount">0</span></button>
        <button class="tab" data-tab="notes">Заметки <span class="count" id="notesCount">0</span></button>
      </nav>
    </header>
    <section class="page" id="page"></section>
  </main>
  <button class="fab" id="fab">+</button>

  <section class="overlay" id="taskSheet"><div class="sheet"><div class="grab"></div><h2 id="taskSheetTitle">Редактирование задачи</h2><form id="taskForm" class="form"></form></div></section>
  <section class="overlay" id="projectSheet"><div class="sheet"><div class="grab"></div><h2 id="projectSheetTitle">Проект</h2><form id="projectForm" class="form"></form></div></section>
  <section class="overlay" id="completedSheet"><div class="sheet"><div class="grab"></div><h2>Завершённые задачи</h2><div id="completedList" class="list"></div></div></section>

  <section class="full-editor" id="noteEditor">
    <div class="editor-top"><button id="closeNote">← Назад</button><button id="saveNoteBtn">Сохранить</button></div>
    <input id="noteTitle" class="note-title" placeholder="Заголовок">
    <div class="note-editbar"><button class="tool" data-note-cmd="undo">↩</button><button class="tool" data-note-cmd="redo">↪</button><span class="sep"></span><button class="tool" data-note-cmd="bold">B</button><button class="tool" data-note-cmd="insertUnorderedList">• Список</button><span class="sep"></span><button class="tool" id="attachBtn">📎</button></div>
    <div class="attach-menu" id="attachMenu"><button data-accept="*/*">Документ</button><button data-accept="image/*">Фото</button></div><input id="attachInput" type="file" hidden>
    <div id="noteBody" class="note-body" contenteditable="true" data-placeholder="Начните писать..."></div><div id="attachments" class="attachments"></div>
  </section>
  <input id="restoreInput" type="file" accept="application/json" hidden>
  <div class="toast" id="toast"></div>
<script>
const A='#0D9488', LS={tasks:'lawyerTasks',projects:'lawyerProjects',projectTasks:'lawyerProjectTasks',notes:'lawyerNotes'};
const statusText={new:'Новая',inwork:'В работе',waiting:'Ожидание',done:'Завершена'};
const priorityText={none:'Обычная',low:'Низкая',normal:'Обычная',medium:'Средняя',high:'Высокая'};
const stripe={none:'#bdbdbd',low:'#bdbdbd',normal:A,medium:'#e87800',high:'#ff4d57',done:'#75c985'};
let state={tab:'tasks',filter:'active',projectId:null,editingTask:null,editingProject:null,note:null,showCompleted:false};
const $=s=>document.querySelector(s), load=k=>JSON.parse(localStorage.getItem(k)||'[]'), save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const now=()=>new Date().toISOString(), uid=()=>String(Date.now()+Math.floor(Math.random()*999));
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function sanitize(html){const t=document.createElement('template');t.innerHTML=html||'';const ok=['B','STRONG','I','EM','UL','OL','LI','BR','P','DIV'];(function walk(n){[...n.children].forEach(e=>{if(!ok.includes(e.tagName)){e.replaceWith(document.createTextNode(e.textContent));return}[...e.attributes].forEach(a=>{if(a.name!=='style')e.removeAttribute(a.name)});if(e.getAttribute('style')){const st=e.getAttribute('style').split(';').filter(x=>/^\s*font-(weight|style)\s*:/i.test(x)).join(';');st?e.setAttribute('style',st):e.removeAttribute('style')}walk(e)})})(t.content);return t.innerHTML}
function fmtDate(v){if(!v)return'';const d=new Date(v+'T00:00:00');return d.toLocaleDateString('ru-RU')} function overdue(t){return t.dueDate&&t.status!=='done'&&new Date(t.dueDate+'T23:59:59')<new Date()}
function seed(){if(!localStorage.getItem(LS.tasks))save(LS.tasks,[{id:uid(),title:'Ответ на претензию контрагента',extra:'',dueDate:'2026-07-03',reminder:2,priority:'high',status:'inwork',notes:'',createdAt:now(),updatedAt:now()},{id:uid(),title:'Подготовить исковое заявление по договору поставки',extra:'Ответчик: ООО "Ромашка", сумма 1.5 млн руб.',dueDate:'2026-07-07',reminder:3,priority:'high',status:'inwork',notes:'',createdAt:now(),updatedAt:now()},{id:uid(),title:'Проверить договор аренды',extra:'Новый арендатор, помещение на 3 этаже',dueDate:'2026-07-11',reminder:2,priority:'medium',status:'new',notes:'',createdAt:now(),updatedAt:now()},{id:uid(),title:'Обновить шаблоны типовых договоров',extra:'Согласовать с отделом комплаенс',dueDate:'',reminder:0,priority:'low',status:'new',notes:'',createdAt:now(),updatedAt:now()},{id:uid(),title:'Вопрос по рекламе: мы отправили сразу на бумаге или и онлайн? Может был лофт? Больше ведь рекламы не было. Особенности ПО',extra:'',dueDate:'',reminder:0,priority:'normal',status:'done',notes:'',createdAt:now(),updatedAt:now()}]);if(!localStorage.getItem(LS.projects))save(LS.projects,[{id:uid(),title:'Торговый оборот',description:'Задачи связанные с торговым оборотом банка',createdAt:now(),updatedAt:now()}]);if(!localStorage.getItem(LS.projectTasks))save(LS.projectTasks,[]);if(!localStorage.getItem(LS.notes))save(LS.notes,[])}
function initAssets(){const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop stop-color='${A}'/><stop offset='1' stop-color='#065F56'/></linearGradient></defs><rect width='180' height='180' rx='42' fill='url(#g)'/><circle cx='90' cy='90' r='50' fill='rgba(255,255,255,.24)' stroke='rgba(255,255,255,.65)' stroke-width='3'/><path d='M62 91l20 20 40-48' fill='none' stroke='white' stroke-width='13' stroke-linecap='round' stroke-linejoin='round'/></svg>`;faviconLink.href='data:image/svg+xml,'+encodeURIComponent(svg);manifestLink.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify({name:'Задачи юриста',short_name:'Юрист',start_url:'.',display:'standalone',background_color:'#ffffff',theme_color:A,icons:[]}));const c=document.createElement('canvas');c.width=c.height=180;const x=c.getContext('2d'),g=x.createLinearGradient(0,0,180,180);g.addColorStop(0,A);g.addColorStop(1,'#065F56');x.fillStyle=g;x.roundRect(0,0,180,180,42);x.fill();x.fillStyle='rgba(255,255,255,.24)';x.strokeStyle='rgba(255,255,255,.65)';x.lineWidth=3;x.beginPath();x.arc(90,90,50,0,7);x.fill();x.stroke();x.strokeStyle='#fff';x.lineWidth=13;x.lineCap='round';x.lineJoin='round';x.beginPath();x.moveTo(62,91);x.lineTo(82,111);x.lineTo(122,63);x.stroke();appleIconLink.href=c.toDataURL('image/png')}
function allTasks(){return state.projectId?load(LS.projectTasks).filter(t=>t.projectId===state.projectId):load(LS.tasks)} function putTasks(arr){state.projectId?save(LS.projectTasks,[...load(LS.projectTasks).filter(t=>t.projectId!==state.projectId),...arr]):save(LS.tasks,arr)}
function statsLine(){const ts=allTasks(), inw=ts.filter(t=>t.status==='inwork').length, over=ts.filter(overdue).length, done=ts.filter(t=>t.status==='done').length;return `${inw} в работе · ${over} просрочено · ${done} завершено`}
function updateHeader(){const tasks=load(LS.tasks).filter(t=>t&&t.id), projects=load(LS.projects).filter(p=>p&&p.id), notes=load(LS.notes).filter(n=>n&&n.id);tasksCount.textContent=tasks.filter(t=>t.status!=='done').length;projectsCount.textContent=projects.length;notesCount.textContent=notes.length;stats.textContent=statsLine();const project=projects.find(p=>p.id===state.projectId);$('#top').classList.toggle('compact',!!project);navline.classList.toggle('hidden',!project);tabs.classList.toggle('hidden',!!project);mainTitle.classList.toggle('hidden',!!project);if(project)contextTitle.textContent=project.title;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab))}
function render(){updateHeader();page.innerHTML='';if(state.projectId){renderTasks();return}if(state.tab==='tasks'){renderTasks();return}if(state.tab==='projects'){renderProjects();return}if(state.tab==='notes'){renderNotes()}}
function taskPass(t){if(state.filter==='active')return t.status!=='done';return t.status===state.filter}
function renderFilters(){return `<div class="filters"><button class="chip ${state.filter==='active'?'active':''}" data-filter="active">Все активные</button><button class="chip ${state.filter==='inwork'?'active':''}" data-filter="inwork">В работе</button><button class="chip ${state.filter==='waiting'?'active':''}" data-filter="waiting">Ожидание</button></div>`}
function taskCard(t,doneMode=false){return `<article class="card" style="--stripe:${t.status==='done'?stripe.done:stripe[t.priority]}"><h3>${esc(t.title)}</h3>${t.extra?`<p class="extra">${esc(t.extra)}</p>`:''}<div class="badges"><span class="badge status-${t.status}">${statusText[t.status]}</span><span class="badge pr-${t.priority}">${priorityText[t.priority]}</span>${t.dueDate?`<span class="date ${overdue(t)?'hot':''}">${fmtDate(t.dueDate)}</span>`:''}</div><div class="buttons"><button class="btn" data-edit-task="${t.id}">Изменить</button>${!doneMode&&t.status!=='done'?`<button class="btn ok" data-done-task="${t.id}">Готово</button>`:''}<button class="btn" data-ics-task="${t.id}">Календарь</button><button class="btn danger" data-del-task="${t.id}">Удалить</button></div></article>`}
function renderTasks(){const ts=allTasks().filter(t=>t&&t.id), done=ts.filter(t=>t.status==='done'), list=ts.filter(taskPass);const completed=`<section class="completed-section"><button class="completed-link" id="toggleCompleted"><span>${state.showCompleted?'▴':'▾'}</span>Завершённые (${done.length})</button>${state.showCompleted?`<div class="list completed-list">${done.map(t=>taskCard(t,true)).join('')||'<div class="empty">Завершённых задач нет</div>'}</div>`:''}</section>`;page.innerHTML=`${renderFilters()}<div class="list">${list.map(t=>taskCard(t)).join('')||'<div class="empty">Нет задач</div>'}</div>${!state.projectId?`<div class="bottom-actions"><button class="btn" id="csvBtn">Экспорт CSV</button><button class="btn" id="backupBtn">Резервная копия</button><button class="btn" id="restoreBtn">Восстановить</button></div>`:''}${completed}`}
function renderProjects(){const pts=load(LS.projectTasks).filter(t=>t&&t.id);page.innerHTML=`<input class="search" id="projectSearch" placeholder="Поиск проектов..."><div class="list" id="projectsList"></div>`;const projectSearchEl=$('#projectSearch'),projectsListEl=$('#projectsList');function draw(){const query=projectSearchEl.value.toLowerCase();const projects=load(LS.projects).filter(p=>p&&p.id).filter(p=>!query||JSON.stringify(p).toLowerCase().includes(query));projectsCount.textContent=projects.length;projectsListEl.innerHTML=projects.map(p=>{const sub=pts.filter(t=>t.projectId===p.id), active=sub.filter(t=>t.status!=='done').length;return `<article class="card project-card"><h3 data-open-project="${p.id}">${esc(p.title)}</h3><p class="extra">${esc(p.description||'')}</p><p class="meta">Задач: ${sub.length} (активных: ${active})</p><div class="buttons"><button class="btn" data-edit-project="${p.id}">Изменить</button><button class="btn danger" data-del-project="${p.id}">Удалить</button></div></article>`}).join('')||'<div class="empty">Нет проектов</div>'}projectSearchEl.oninput=draw;draw()}
function renderNotes(){const notes=load(LS.notes).filter(n=>n&&n.id);notesCount.textContent=notes.length;page.innerHTML=`<div class="list">${notes.map(n=>`<article class="card notes-card" data-open-note="${n.id}"><h3>${esc(n.title||'Без заголовка')}</h3><p class="extra">${sanitize(n.body||'').replace(/<[^>]+>/g,' ').slice(0,160)||'Пустая заметка'}</p><div class="badges"><span class="badge status-new">Вложений: ${(n.attachments||[]).length}</span></div></article>`).join('')||'<div class="empty">Нет заметок</div>'}</div>`}
function openTask(t={}){state.editingTask=t;taskSheetTitle.textContent=t.id?'Редактирование задачи':'Новая задача';taskForm.innerHTML=`<div class="field"><label>Краткая суть задачи *</label><textarea name="title" required>${esc(t.title||'')}</textarea></div><div class="field"><label>Что требуется дополнительно</label><textarea name="extra" placeholder="Дополнительная информация">${esc(t.extra||'')}</textarea></div><div class="grid2"><div class="field"><label>Дата ответа</label><input type="date" name="dueDate" value="${esc(t.dueDate||'')}"></div><div class="field"><label>Напоминание</label><span class="select-wrap"><select name="reminder"><option value="0">Нет</option><option value="1">За 1 день</option><option value="2">За 2 дня</option><option value="3">За 3 дня</option><option value="7">За неделю</option></select></span></div></div><div class="grid2"><div class="field"><label>Значимость</label><span class="select-wrap"><select name="priority"><option value="normal">Обычная</option><option value="low">Низкая</option><option value="medium">Средняя</option><option value="high">Высокая</option></select></span></div><div class="field"><label>Статус</label><span class="select-wrap"><select name="status"><option value="new">Новая</option><option value="inwork">В работе</option><option value="waiting">Ожидание</option><option value="done">Завершена</option></select></span></div></div><div class="field"><label>Заметки</label><div class="editbox"><div class="editbar"><button type="button" class="tool" data-task-cmd="undo">↩</button><button type="button" class="tool" data-task-cmd="redo">↪</button><span class="sep"></span><button type="button" class="tool" data-task-cmd="bold">B</button><button type="button" class="tool" data-task-cmd="insertUnorderedList">• Список</button></div><div id="taskNotes" class="editable" contenteditable="true" data-placeholder="Заметки к задаче...">${sanitize(t.notes||'')}</div></div></div><div class="sheet-actions"><button type="button" class="btn" id="cancelTask">Отмена</button><button class="btn primary">Сохранить</button></div>`;taskForm.reminder.value=t.reminder??0;taskForm.priority.value=t.priority||'normal';taskForm.status.value=t.status||'new';taskSheet.classList.add('show')}
function saveTaskForm(e){e.preventDefault();const f=new FormData(taskForm), arr=allTasks(), old=state.editingTask?.id&&arr.find(x=>x.id===state.editingTask.id);const obj={...(old||{}),id:old?.id||uid(),projectId:state.projectId||old?.projectId,title:f.get('title').trim(),extra:f.get('extra').trim(),dueDate:f.get('dueDate'),reminder:+f.get('reminder')||0,priority:f.get('priority'),status:f.get('status'),notes:sanitize(taskNotes.innerHTML),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);putTasks(arr);taskSheet.classList.remove('show');toastMsg('Сохранено');render()}
function openProject(p={}){state.editingProject=p;projectSheetTitle.textContent=p.id?'Редактирование проекта':'Новый проект';projectForm.innerHTML=`<div class="field"><label>Название проекта *</label><input name="title" required value="${esc(p.title||'')}"></div><div class="field"><label>Описание</label><textarea name="description">${esc(p.description||'')}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelProject">Отмена</button><button class="btn primary">Сохранить</button></div>`;projectSheet.classList.add('show')}
function saveProjectForm(e){e.preventDefault();const f=new FormData(projectForm), arr=load(LS.projects), old=state.editingProject?.id&&arr.find(x=>x.id===state.editingProject.id);const obj={...(old||{}),id:old?.id||uid(),title:f.get('title').trim(),description:f.get('description').trim(),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.projects,arr);projectSheet.classList.remove('show');toastMsg('Проект сохранён');render()}
function openCompleted(){completedList.innerHTML=allTasks().filter(t=>t.status==='done').map(t=>taskCard(t,true)).join('')||'<div class="empty">Завершённых задач нет</div>';completedSheet.classList.add('show')}
function openNote(n){state.note=n||{id:uid(),title:'',body:'',attachments:[],createdAt:now(),updatedAt:now()};noteTitle.value=state.note.title||'';noteBody.innerHTML=sanitize(state.note.body||'');renderAttachments();noteEditor.classList.add('show');setTimeout(()=>noteTitle.focus(),80)}
function saveNote(){if(!state.note)return;const arr=load(LS.notes), old=arr.find(n=>n.id===state.note.id);state.note.title=noteTitle.value.trim();state.note.body=sanitize(noteBody.innerHTML);state.note.updatedAt=now();old?arr.splice(arr.indexOf(old),1,state.note):arr.push(state.note);save(LS.notes,arr);render();toastMsg('Заметка сохранена')}
function renderAttachments(){attachments.innerHTML=(state.note?.attachments||[]).map(a=>`<div class="attachment"><span>${icon(a.type)}</span><a href="#" data-dl="${a.id}">${esc(a.name)}</a><small>${fmt(a.size)}</small><button class="btn danger" data-rm-att="${a.id}">×</button></div>`).join('')}
function icon(t){return /pdf/.test(t)?'📄':/word/.test(t)?'📝':/excel|spreadsheet/.test(t)?'📊':/image/.test(t)?'📷':/video/.test(t)?'🎞️':/zip|rar|archive/.test(t)?'📁':'📎'} function fmt(b){return b<1024?b+' Б':b<1048576?(b/1024).toFixed(1)+' КБ':(b/1048576).toFixed(1)+' МБ'}
function download(name,data,type){const a=document.createElement('a'),u=URL.createObjectURL(data instanceof Blob?data:new Blob([data],{type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
function csvSafe(v){v=String(v??'');if(/^[=+\-@]/.test(v))v="'"+v;return '"'+v.replace(/"/g,'""')+'"'} function exportCsv(){const rows=[['title','extra','dueDate','reminder','priority','status'],...load(LS.tasks).map(t=>[t.title,t.extra,t.dueDate,t.reminder,t.priority,t.status])];download('tasks.csv',rows.map(r=>r.map(csvSafe).join(',')).join('\n'),'text/csv')}
function backup(){download('lawyer-backup-v3.json',JSON.stringify({version:3,tasks:load(LS.tasks).map(t=>({summary:t.title,additionalInfo:t.extra,responseDate:t.dueDate,reminderDays:t.reminder,priority:t.priority,status:t.status==='inwork'?'in-progress':t.status==='done'?'completed':t.status,notes:t.notes})),projects:load(LS.projects),projectTasks:load(LS.projectTasks),notes:load(LS.notes)},null,2),'application/json')}
function restore(file){if(!file)return;const r=new FileReader();r.onload=()=>{const d=JSON.parse(r.result);if(d.version===3&&d.tasks)save(LS.tasks,d.tasks.map(t=>({id:uid(),title:t.summary,extra:t.additionalInfo,dueDate:t.responseDate,reminder:t.reminderDays,priority:t.priority==='medium'?'normal':(t.priority||'normal'),status:t.status==='in-progress'?'inwork':t.status==='completed'?'done':t.status,notes:t.notes||'',createdAt:now(),updatedAt:now()})));['projects','projectTasks','notes'].forEach(k=>d[k]&&save(LS[k],d[k]));render();toastMsg('Данные восстановлены')};r.readAsText(file)}
function makeIcs(t){const dt=(t.dueDate||new Date().toISOString().slice(0,10)).replaceAll('-','');download('task.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${t.title}\nDTSTART;VALUE=DATE:${dt}\nBEGIN:VALARM\nTRIGGER:-P${t.reminder||0}D\nACTION:DISPLAY\nDESCRIPTION:${t.title}\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`,'text/calendar')}
function toastMsg(s){toast.textContent=s;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)}
seed();initAssets();render();
function switchTab(next){state.tab=next;state.projectId=null;state.filter='active';state.showCompleted=false;render()}
tabs.onclick=e=>{const b=e.target.closest('.tab');if(!b)return;switchTab(b.dataset.tab)};document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));backBtn.onclick=()=>{state.projectId=null;state.filter='active';state.showCompleted=false;render()};fab.onclick=()=>state.tab==='projects'&&!state.projectId?openProject():state.tab==='notes'&&!state.projectId?openNote():openTask();
page.onclick=e=>{const f=e.target.dataset.filter;if(f){state.filter=f;state.showCompleted=false;render()} if(e.target.id==='toggleCompleted'){state.showCompleted=!state.showCompleted;render()} let id=e.target.dataset.editTask;if(id)openTask(allTasks().find(t=>t.id===id));id=e.target.dataset.doneTask;if(id){const arr=allTasks(), t=arr.find(x=>x.id===id);t.status='done';t.updatedAt=now();putTasks(arr);render()}id=e.target.dataset.delTask;if(id&&confirm('Удалить задачу?')){putTasks(allTasks().filter(t=>t.id!==id));render()}id=e.target.dataset.icsTask;if(id)makeIcs(allTasks().find(t=>t.id===id));id=e.target.dataset.openProject;if(id){state.projectId=id;state.filter='active';render()}id=e.target.dataset.editProject;if(id)openProject(load(LS.projects).find(p=>p.id===id));id=e.target.dataset.delProject;if(id&&confirm('Удалить проект?')){save(LS.projects,load(LS.projects).filter(p=>p.id!==id));save(LS.projectTasks,load(LS.projectTasks).filter(t=>t.projectId!==id));render()}id=e.target.closest('[data-open-note]')?.dataset.openNote;if(id)openNote(load(LS.notes).find(n=>n.id===id));if(e.target.id==='csvBtn')exportCsv();if(e.target.id==='backupBtn')backup();if(e.target.id==='restoreBtn')restoreInput.click()};
taskForm.onsubmit=saveTaskForm;projectForm.onsubmit=saveProjectForm;restoreInput.onchange=()=>restore(restoreInput.files[0]);
document.addEventListener('click',e=>{if(e.target.id==='cancelTask')taskSheet.classList.remove('show');if(e.target.id==='cancelProject')projectSheet.classList.remove('show');if(e.target.classList.contains('overlay'))e.target.classList.remove('show');if(e.target.dataset.taskCmd){taskNotes.focus();document.execCommand(e.target.dataset.taskCmd,false,null)}let id=e.target.dataset.editTask;if(id&&completedSheet.contains(e.target)){completedSheet.classList.remove('show');openTask(allTasks().find(t=>t.id===id))}id=e.target.dataset.delTask;if(id&&completedSheet.contains(e.target)&&confirm('Удалить задачу?')){putTasks(allTasks().filter(t=>t.id!==id));openCompleted();render()}id=e.target.dataset.icsTask;if(id&&completedSheet.contains(e.target))makeIcs(allTasks().find(t=>t.id===id))});
closeNote.onclick=()=>{saveNote();noteEditor.classList.remove('show')};saveNoteBtn.onclick=()=>{saveNote();noteEditor.classList.remove('show')};document.querySelectorAll('[data-note-cmd]').forEach(b=>b.onclick=()=>{noteBody.focus();document.execCommand(b.dataset.noteCmd,false,null)});attachBtn.onclick=e=>{e.stopPropagation();attachMenu.classList.toggle('show')};document.addEventListener('click',e=>{if(!attachBtn.contains(e.target)&&!attachMenu.contains(e.target))attachMenu.classList.remove('show')});attachMenu.onclick=e=>{if(e.target.dataset.accept){attachInput.accept=e.target.dataset.accept;attachInput.click()}};attachInput.onchange=()=>{const f=attachInput.files[0];if(!f)return;if(f.size>5*1024*1024)return alert('Максимальный размер файла — 5 МБ');const r=new FileReader();r.onload=()=>{state.note.attachments.push({id:uid(),name:f.name,type:f.type,size:f.size,data:r.result});renderAttachments();saveNote()};r.readAsDataURL(f)};attachments.onclick=e=>{const rm=e.target.dataset.rmAtt, dl=e.target.dataset.dl;if(rm){state.note.attachments=state.note.attachments.filter(a=>a.id!==rm);renderAttachments();saveNote()}if(dl){e.preventDefault();const a=state.note.attachments.find(x=>x.id===dl);fetch(a.data).then(r=>r.blob()).then(b=>download(a.name,b,a.type))}};
if('serviceWorker' in navigator){const sw=`self.addEventListener('install',e=>e.waitUntil(caches.open('lawyer-pwa-v2').then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(x=>{let y=x.clone();caches.open('lawyer-pwa-v2').then(c=>c.put(e.request,y));return x}).catch(()=>caches.match('./')))))`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{})}
</script>
</body>
