<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="задачи В.Ю.Марченко">
  <meta name="theme-color" content="#0F766E">
  <title>задачи В.Ю.Марченко</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:light;--font:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;--bg:#F5F7F6;--surface:#FFFFFF;--surface-2:#F9FAFA;--text:#17211F;--muted:#66736F;--faint:#93A19D;--line:#E3E9E7;--line-strong:#D5DFDC;--accent:#0F766E;--accent-2:#0D9488;--accent-soft:#E5F5F2;--danger:#DC2626;--danger-soft:#FEE2E2;--warn:#D97706;--warn-soft:#FEF3C7;--green:#16803C;--green-soft:#E8F8EE;--violet:#6D28D9;--violet-soft:#F1ECFF;--radius-sm:14px;--radius-lg:24px;--shadow-sm:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.05);--shadow-md:0 20px 50px rgba(15,23,42,.12);--safe-bottom:env(safe-area-inset-bottom)}
    @media (prefers-color-scheme:dark){:root{color-scheme:dark;--bg:#0E1413;--surface:#141C1A;--surface-2:#101816;--text:#EEF5F3;--muted:#A6B4B0;--faint:#778783;--line:#22312E;--line-strong:#2E403C;--accent:#2DD4BF;--accent-2:#5EEAD4;--accent-soft:rgba(45,212,191,.13);--danger:#F87171;--danger-soft:rgba(248,113,113,.14);--warn:#FBBF24;--warn-soft:rgba(251,191,36,.13);--green:#4ADE80;--green-soft:rgba(74,222,128,.13);--violet:#A78BFA;--violet-soft:rgba(167,139,250,.15);--shadow-sm:0 1px 2px rgba(0,0,0,.25),0 10px 30px rgba(0,0,0,.24);--shadow-md:0 24px 60px rgba(0,0,0,.38)}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;margin:0}html{background:var(--bg)}body{color:var(--text);background:radial-gradient(circle at top left,rgba(15,118,110,.10),transparent 34rem),linear-gradient(180deg,var(--bg),var(--bg));font-family:var(--font);font-size:16px;line-height:1.42;letter-spacing:-.012em;padding:env(safe-area-inset-top) 0 calc(92px + var(--safe-bottom));-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}button,input,textarea,select{font:inherit;font-size:16px}button{border:0;background:none;color:inherit;cursor:pointer}.app{max-width:780px;margin:0 auto}.top{position:sticky;top:0;z-index:5;padding:18px 18px 0;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(22px) saturate(1.2);border-bottom:1px solid color-mix(in srgb,var(--line) 82%,transparent)}.navline{display:flex;align-items:center;gap:10px;min-width:0}.back{min-height:36px;padding:0 10px;margin-left:-10px;border-radius:999px;font-weight:700;color:var(--accent);white-space:nowrap}.back:active{background:var(--accent-soft)}.title{margin:0 0 8px;font-size:clamp(25px,5.8vw,36px);line-height:1.02;font-weight:800;letter-spacing:-.055em}.stats{margin:0 0 16px;color:var(--muted);font-size:14px;font-weight:500}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:5px;margin:0 0 10px;border:1px solid var(--line);border-radius:999px;background:color-mix(in srgb,var(--surface) 82%,transparent);box-shadow:0 1px 0 rgba(255,255,255,.32) inset}.tab{position:relative;min-height:42px;padding:0 8px;border-radius:999px;text-align:center;font-weight:700;color:var(--muted);transition:background .18s ease,color .18s ease,transform .18s ease}.tab.active{background:var(--text);color:var(--surface)}.tab:active{transform:scale(.985)}.count{display:inline-grid;place-items:center;min-width:22px;height:22px;margin-left:4px;padding:0 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:800;vertical-align:1px}.tab.active .count{background:color-mix(in srgb,var(--surface) 18%,transparent);color:currentColor}.page{padding:16px 18px 26px}.filters{display:flex;gap:8px;overflow:auto;padding:0 0 14px;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;min-height:38px;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--muted);font-size:14px;font-weight:700;box-shadow:0 1px 0 rgba(255,255,255,.4) inset;transition:border-color .18s ease,background .18s ease,color .18s ease,transform .18s ease}.chip.active{border-color:color-mix(in srgb,var(--accent) 34%,var(--line));background:var(--accent-soft);color:var(--accent)}.chip:active{transform:scale(.98)}.search{width:100%;height:52px;margin:0 0 14px;padding:0 16px;border:1px solid var(--line);border-radius:var(--radius-sm);outline:none;background:var(--surface);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.35) inset}.search:focus,.field input:focus,.field textarea:focus,.field select:focus{border-color:color-mix(in srgb,var(--accent) 55%,var(--line));box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%,transparent)}.list{display:grid;gap:12px}.card{position:relative;overflow:hidden;padding:17px 16px 16px 20px;border:1px solid var(--line);border-radius:var(--radius-lg);background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 98%,white),var(--surface));box-shadow:var(--shadow-sm)}.card:before{content:"";position:absolute;left:0;top:16px;bottom:16px;width:4px;border-radius:999px;background:var(--stripe,#CBD5E1)}.card h3{margin:0 0 8px;font-size:18px;line-height:1.25;font-weight:750;letter-spacing:-.028em}.extra{margin:0 0 12px;color:var(--muted);font-size:14px;line-height:1.45;white-space:pre-wrap}.badges,.buttons,.bottom-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.badges{margin:0 0 14px}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;letter-spacing:-.01em}.status-new,.pr-normal{background:var(--accent-soft);color:var(--accent)}.status-inwork,.status-in-progress{background:var(--warn-soft);color:var(--warn)}.status-waiting{background:var(--violet-soft);color:var(--violet)}.status-done,.status-completed{background:var(--green-soft);color:var(--green)}.pr-low{background:color-mix(in srgb,var(--surface-2) 70%,#CBD5E1);color:var(--muted)}.pr-medium{background:var(--warn-soft);color:var(--warn)}.pr-high{background:var(--danger-soft);color:var(--danger)}.date{font-size:13px;color:var(--faint);font-weight:650}.date.hot{color:var(--danger);font-weight:800}.btn{min-height:40px;padding:0 13px;border:1px solid var(--line);border-radius:13px;background:var(--surface);color:var(--text);font-size:14px;font-weight:750;display:inline-flex;align-items:center;justify-content:center;transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease}.btn:active{transform:translateY(1px) scale(.99)}.btn.primary{border-color:transparent;background:linear-gradient(180deg,var(--accent-2),var(--accent));color:#fff;box-shadow:0 12px 24px color-mix(in srgb,var(--accent) 22%,transparent)}.btn.ok{border-color:color-mix(in srgb,var(--green) 30%,var(--line));color:var(--green);background:var(--green-soft)}.btn.danger{border-color:color-mix(in srgb,var(--danger) 28%,var(--line));color:var(--danger);background:var(--danger-soft)}.bottom-actions{margin-top:22px}.completed-section{margin-top:18px;padding-top:10px;border-top:1px solid var(--line)}.completed-link{width:100%;min-height:44px;padding:0;color:var(--muted);text-align:left;font-size:15px;font-weight:750}.empty{padding:34px 16px;text-align:center;color:var(--faint);background:color-mix(in srgb,var(--surface) 72%,transparent);border:1px dashed var(--line-strong);border-radius:var(--radius-lg)}.fab{position:fixed;right:22px;bottom:calc(22px + var(--safe-bottom));z-index:12;width:62px;height:62px;border-radius:22px;background:linear-gradient(180deg,var(--accent-2),var(--accent));color:#fff;font-size:34px;line-height:1;box-shadow:0 20px 42px color-mix(in srgb,var(--accent) 34%,transparent)}.project-card,.note-card{padding-left:16px}.project-card:before,.note-card:before{display:none}.project-card h3,.note-card h3{cursor:pointer}.meta{color:var(--faint);font-size:14px;font-weight:600;margin:6px 0 13px}.progress{height:8px;background:var(--accent-soft);border-radius:999px;overflow:hidden;margin:8px 0 14px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:inherit}.overlay{position:fixed;inset:0;z-index:30;background:rgba(9,15,14,.42);backdrop-filter:blur(8px);display:none;align-items:flex-end}.overlay.show{display:flex}.sheet{width:100%;max-height:88vh;overflow:auto;background:var(--surface);border:1px solid var(--line);border-bottom:0;border-radius:28px 28px 0 0;padding:12px 18px calc(26px + var(--safe-bottom));box-shadow:var(--shadow-md)}.grab{width:46px;height:5px;border-radius:99px;background:var(--line-strong);margin:4px auto 18px}.sheet h2{font-size:22px;letter-spacing:-.035em;margin:0 0 18px}.form{display:grid;gap:15px}.field{display:grid;gap:8px}.field label{font-size:13px;font-weight:800;color:var(--muted)}.field input,.field textarea,.field select{width:100%;min-height:52px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface-2);color:var(--text);padding:13px 14px;outline:none;-webkit-appearance:none}.field textarea{min-height:96px;resize:vertical;line-height:1.45}.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none!important}@media(max-width:390px){.top,.page{padding-left:14px;padding-right:14px}.grid2{grid-template-columns:1fr}.tab{font-size:14px}.btn{font-size:13px;padding:0 11px}.fab{right:16px;width:58px;height:58px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div id="navline" class="navline hidden"><button class="back" id="backBtn">← Назад</button><h1 class="title" id="contextTitle"></h1></div>
      <h1 id="mainTitle" class="title">задачи В.Ю.Марченко</h1>
      <p class="stats" id="stats"></p>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="tasks">Задачи <span class="count" id="tasksCount">0</span></button>
        <button class="tab" data-tab="projects">Проекты <span class="count" id="projectsCount">0</span></button>
        <button class="tab" data-tab="notes">Заметки <span class="count" id="notesCount">0</span></button>
      </nav>
    </header>
    <section class="page" id="page"></section>
  </main>
  <button class="fab" id="fab">+</button>
  <section class="overlay" id="taskSheet"><div class="sheet"><div class="grab"></div><h2 id="taskSheetTitle">Задача</h2><form id="taskForm" class="form"></form></div></section>
  <section class="overlay" id="projectSheet"><div class="sheet"><div class="grab"></div><h2 id="projectSheetTitle">Проект</h2><form id="projectForm" class="form"></form></div></section>
  <section class="overlay" id="noteSheet"><div class="sheet"><div class="grab"></div><h2 id="noteSheetTitle">Заметка</h2><form id="noteForm" class="form"></form></div></section>
  <input id="restoreInput" type="file" accept="application/json" hidden>
<script>
const APP_TITLE='задачи В.Ю.Марченко';
const A='#0F766E';
const LS={tasks:'lawyerTasks',projects:'lawyerProjects',projectTasks:'lawyerProjectTasks',notes:'lawyerNotes'};
const statusText={new:'Новая',inwork:'В работе','in-progress':'В работе',waiting:'Ожидание',done:'Завершена',completed:'Завершена'};
const priorityText={none:'Обычная',low:'Низкая',normal:'Обычная',medium:'Средняя',high:'Высокая'};
const stripe={none:'#cbd5e1',low:'#94a3b8',normal:A,medium:'#d97706',high:'#dc2626',done:'#16803c',completed:'#16803c'};
let state={tab:'tasks',filter:'active',projectId:null,editingTask:null,editingProject:null,editingNote:null,showCompleted:false};
const $=s=>document.querySelector(s);
const uid=()=>String(Date.now()+Math.floor(Math.random()*999));
const now=()=>new Date().toISOString();
function load(k){try{const v=JSON.parse(localStorage.getItem(k)||'[]');return Array.isArray(v)?v:[]}catch{return []}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function stripHtml(v){const d=document.createElement('div');d.innerHTML=String(v||'');return d.textContent||d.innerText||''}
function fmtDate(v){return v?new Date(v+'T00:00:00').toLocaleDateString('ru-RU'):''}
function normalStatus(s){return s==='completed'?'done':s==='in-progress'?'inwork':(s||'new')}
function valid(o){return o&&o.id}
function normTask(t){return {...t,status:normalStatus(t.status),priority:t.priority||'normal',title:t.title||t.summary||'',extra:t.extra||t.additionalInfo||'',dueDate:t.dueDate||t.responseDate||'',reminder:+(t.reminder??t.reminderDays)||0,notes:t.notes||''}}
function allProjects(){return load(LS.projects).filter(valid).map(p=>({...p,title:p.title||p.name||'',description:p.description||''}))}
function allNotes(){return load(LS.notes).filter(valid)}
function tasks(){const arr=load(state.projectId?LS.projectTasks:LS.tasks).filter(valid).map(normTask);return state.projectId?arr.filter(t=>t.projectId===state.projectId):arr}
function putTasks(arr){if(state.projectId){const rest=load(LS.projectTasks).filter(t=>t.projectId!==state.projectId);save(LS.projectTasks,[...rest,...arr])}else save(LS.tasks,arr)}
function counts(){return{tasks:load(LS.tasks).filter(t=>valid(t)&&normalStatus(t.status)!=='done').length,projects:allProjects().length,notes:allNotes().length}}
function statsLine(){const ts=tasks();return `${ts.filter(t=>t.status==='inwork').length} в работе · ${ts.filter(overdue).length} просрочено · ${ts.filter(t=>t.status==='done').length} завершено`}
function overdue(t){return t.dueDate&&t.status!=='done'&&new Date(t.dueDate+'T23:59:59')<new Date()}
function updateHeader(){const c=counts(),project=allProjects().find(p=>p.id===state.projectId);tasksCount.textContent=c.tasks;projectsCount.textContent=c.projects;notesCount.textContent=c.notes;stats.textContent=statsLine();navline.classList.toggle('hidden',!project);tabs.classList.toggle('hidden',!!project);mainTitle.classList.toggle('hidden',!!project);mainTitle.textContent=APP_TITLE;document.title=APP_TITLE;if(project)contextTitle.textContent=project.title;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab))}
function render(){updateHeader();page.innerHTML='';if(state.projectId||state.tab==='tasks')renderTasks();else if(state.tab==='projects')renderProjects();else renderNotes()}
function renderFilters(){return `<div class="filters"><button class="chip ${state.filter==='active'?'active':''}" data-filter="active">Все активные</button><button class="chip ${state.filter==='inwork'?'active':''}" data-filter="inwork">В работе</button><button class="chip ${state.filter==='waiting'?'active':''}" data-filter="waiting">Ожидание</button></div>`}
function taskPass(t){return state.filter==='active'?t.status!=='done':t.status===state.filter}
function taskCard(t,done=false){return `<article class="card" style="--stripe:${t.status==='done'?stripe.done:stripe[t.priority]||A}"><h3>${esc(t.title)}</h3>${t.extra?`<p class="extra">${esc(t.extra)}</p>`:''}<div class="badges"><span class="badge status-${t.status}">${statusText[t.status]||t.status}</span><span class="badge pr-${t.priority}">${priorityText[t.priority]||t.priority}</span>${t.dueDate?`<span class="date ${overdue(t)?'hot':''}">${fmtDate(t.dueDate)}</span>`:''}</div><div class="buttons"><button class="btn" data-edit-task="${t.id}">Изменить</button>${!done&&t.status!=='done'?`<button class="btn ok" data-done-task="${t.id}">Готово</button>`:''}<button class="btn" data-ics-task="${t.id}">Календарь</button><button class="btn danger" data-del-task="${t.id}">Удалить</button></div></article>`}
function renderTasks(){const ts=tasks(),done=ts.filter(t=>t.status==='done'),list=ts.filter(taskPass);page.innerHTML=`${renderFilters()}<div class="list">${list.map(t=>taskCard(t)).join('')||'<div class="empty">Нет задач</div>'}</div>${!state.projectId?`<div class="bottom-actions"><button class="btn" id="csvBtn">CSV</button><button class="btn" id="backupBtn">Резерв</button><button class="btn" id="restoreBtn">Восстановить</button></div>`:''}<section class="completed-section"><button class="completed-link" id="toggleCompleted">${state.showCompleted?'▴':'▾'} Завершённые (${done.length})</button>${state.showCompleted?`<div class="list">${done.map(t=>taskCard(t,true)).join('')||'<div class="empty">Завершённых задач нет</div>'}</div>`:''}</section>`}
function renderProjects(){const pts=load(LS.projectTasks).filter(valid).map(normTask);page.innerHTML=`<button class="btn primary" id="newProjectBtn" style="width:100%;margin-bottom:12px">Новый проект</button><input class="search" id="projectSearch" placeholder="Поиск проектов"><div class="list" id="projectsList"></div>`;const input=$('#projectSearch'),list=$('#projectsList');function draw(){const q=input.value.toLowerCase();const projects=allProjects().filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q));projectsCount.textContent=projects.length;list.innerHTML=projects.map(p=>{const sub=pts.filter(t=>t.projectId===p.id),done=sub.filter(t=>t.status==='done').length,pr=sub.length?Math.round(done/sub.length*100):0;return `<article class="card project-card"><h3 data-open-project="${p.id}">${esc(p.title)}</h3><p class="extra">${esc(p.description||'')}</p><p class="meta">Задач: ${sub.length} · активных: ${sub.length-done}</p><div class="progress"><span style="width:${pr}%"></span></div><div class="buttons"><button class="btn" data-open-project="${p.id}">Открыть</button><button class="btn" data-edit-project="${p.id}">Изменить</button><button class="btn danger" data-del-project="${p.id}">Удалить</button></div></article>`}).join('')||'<div class="empty">Нет проектов</div>'}input.oninput=draw;draw()}
function renderNotes(){const notes=allNotes();page.innerHTML=`<div class="list">${notes.map(n=>`<article class="card note-card" data-open-note="${n.id}"><h3>${esc(n.title||'Без заголовка')}</h3><p class="extra">${esc(stripHtml(n.body).slice(0,180)||'Пустая заметка')}</p></article>`).join('')||'<div class="empty">Нет заметок</div>'}</div>`}
function openTask(t={}){state.editingTask=t;taskSheetTitle.textContent=t.id?'Редактирование задачи':'Новая задача';taskForm.innerHTML=`<div class="field"><label>Краткая суть задачи *</label><textarea name="title" required>${esc(t.title||'')}</textarea></div><div class="field"><label>Что требуется дополнительно</label><textarea name="extra">${esc(t.extra||'')}</textarea></div><div class="grid2"><div class="field"><label>Дата ответа</label><input type="date" name="dueDate" value="${esc(t.dueDate||'')}"></div><div class="field"><label>Напоминание</label><select name="reminder"><option value="0">Нет</option><option value="1">За 1 день</option><option value="2">За 2 дня</option><option value="3">За 3 дня</option><option value="7">За неделю</option></select></div></div><div class="grid2"><div class="field"><label>Значимость</label><select name="priority"><option value="normal">Обычная</option><option value="low">Низкая</option><option value="medium">Средняя</option><option value="high">Высокая</option></select></div><div class="field"><label>Статус</label><select name="status"><option value="new">Новая</option><option value="inwork">В работе</option><option value="waiting">Ожидание</option><option value="done">Завершена</option></select></div></div><div class="field"><label>Заметки</label><textarea name="notes">${esc(stripHtml(t.notes||''))}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelTask">Отмена</button><button class="btn primary">Сохранить</button></div>`;taskForm.reminder.value=t.reminder??0;taskForm.priority.value=t.priority||'normal';taskForm.status.value=t.status||'new';taskSheet.classList.add('show')}
function saveTaskForm(e){e.preventDefault();const f=new FormData(taskForm),arr=tasks(),old=state.editingTask?.id&&arr.find(x=>x.id===state.editingTask.id);const obj={...(old||{}),id:old?.id||uid(),projectId:state.projectId||old?.projectId,title:f.get('title').trim(),extra:f.get('extra').trim(),dueDate:f.get('dueDate'),reminder:+f.get('reminder')||0,priority:f.get('priority'),status:f.get('status'),notes:f.get('notes'),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);putTasks(arr);taskSheet.classList.remove('show');render()}
function openProject(p={}){state.editingProject=p;projectSheetTitle.textContent=p.id?'Редактирование проекта':'Новый проект';projectForm.innerHTML=`<div class="field"><label>Название проекта *</label><input name="title" required value="${esc(p.title||'')}"></div><div class="field"><label>Описание</label><textarea name="description">${esc(p.description||'')}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelProject">Отмена</button><button class="btn primary">Сохранить</button></div>`;projectSheet.classList.add('show')}
function saveProjectForm(e){e.preventDefault();const f=new FormData(projectForm),arr=allProjects(),old=state.editingProject?.id&&arr.find(x=>x.id===state.editingProject.id);const obj={...(old||{}),id:old?.id||uid(),title:f.get('title').trim(),description:f.get('description').trim(),createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.projects,arr);projectSheet.classList.remove('show');render()}
function openNote(n={}){state.editingNote=n;noteSheetTitle.textContent=n.id?'Редактирование заметки':'Новая заметка';noteForm.innerHTML=`<div class="field"><label>Заголовок</label><input name="title" value="${esc(n.title||'')}"></div><div class="field"><label>Текст</label><textarea name="body" style="min-height:220px">${esc(stripHtml(n.body||''))}</textarea></div><div class="sheet-actions"><button type="button" class="btn" id="cancelNote">Отмена</button><button class="btn primary">Сохранить</button></div>`;noteSheet.classList.add('show')}
function saveNoteForm(e){e.preventDefault();const f=new FormData(noteForm),arr=allNotes(),old=state.editingNote?.id&&arr.find(x=>x.id===state.editingNote.id);const obj={...(old||{}),id:old?.id||uid(),title:f.get('title').trim(),body:f.get('body'),attachments:old?.attachments||[],createdAt:old?.createdAt||now(),updatedAt:now()};old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.notes,arr);noteSheet.classList.remove('show');render()}
function download(name,data,type){const a=document.createElement('a'),u=URL.createObjectURL(data instanceof Blob?data:new Blob([data],{type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
function csvSafe(v){v=String(v??'');if(/^[=+\-@]/.test(v))v="'"+v;return '"'+v.replace(/"/g,'""')+'"'}
function exportCsv(){const rows=[['title','extra','dueDate','reminder','priority','status'],...load(LS.tasks).filter(valid).map(normTask).map(t=>[t.title,t.extra,t.dueDate,t.reminder,t.priority,t.status])];download('tasks.csv',rows.map(r=>r.map(csvSafe).join(',')).join('\n'),'text/csv')}
function backup(){download('lawyer-backup.json',JSON.stringify({version:4,tasks:load(LS.tasks),projects:load(LS.projects),projectTasks:load(LS.projectTasks),notes:load(LS.notes)},null,2),'application/json')}
function restore(file){if(!file)return;const r=new FileReader();r.onload=()=>{const d=JSON.parse(r.result);['tasks','projects','projectTasks','notes'].forEach(k=>Array.isArray(d[k])&&save(LS[k],d[k]));render()};r.readAsText(file)}
function makeIcs(t){const dt=(t.dueDate||new Date().toISOString().slice(0,10)).replaceAll('-','');download('task.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${t.title}\nDTSTART;VALUE=DATE:${dt}\nEND:VEVENT\nEND:VCALENDAR`,'text/calendar')}
function switchTab(tab){state={...state,tab,projectId:null,filter:'active',showCompleted:false};render()}

tabs.onclick=e=>{const b=e.target.closest('.tab');if(b)switchTab(b.dataset.tab)};
backBtn.onclick=()=>{state.projectId=null;state.filter='active';state.showCompleted=false;render()};
fab.onclick=()=>state.tab==='projects'&&!state.projectId?openProject():state.tab==='notes'&&!state.projectId?openNote():openTask();
page.onclick=e=>{let id;if(e.target.dataset.filter){state.filter=e.target.dataset.filter;state.showCompleted=false;render()}if(e.target.id==='toggleCompleted'){state.showCompleted=!state.showCompleted;render()}if(e.target.id==='newProjectBtn')openProject();id=e.target.dataset.editTask;if(id)openTask(tasks().find(t=>t.id===id));id=e.target.dataset.doneTask;if(id){const arr=tasks(),t=arr.find(x=>x.id===id);t.status='done';t.updatedAt=now();putTasks(arr);render()}id=e.target.dataset.delTask;if(id&&confirm('Удалить задачу?')){putTasks(tasks().filter(t=>t.id!==id));render()}id=e.target.dataset.icsTask;if(id)makeIcs(tasks().find(t=>t.id===id));id=e.target.dataset.openProject;if(id){state.projectId=id;state.filter='active';state.showCompleted=false;render()}id=e.target.dataset.editProject;if(id)openProject(allProjects().find(p=>p.id===id));id=e.target.dataset.delProject;if(id&&confirm('Удалить проект?')){save(LS.projects,allProjects().filter(p=>p.id!==id));save(LS.projectTasks,load(LS.projectTasks).filter(t=>t.projectId!==id));render()}id=e.target.closest('[data-open-note]')?.dataset.openNote;if(id)openNote(allNotes().find(n=>n.id===id));if(e.target.id==='csvBtn')exportCsv();if(e.target.id==='backupBtn')backup();if(e.target.id==='restoreBtn')restoreInput.click()};
taskForm.onsubmit=saveTaskForm;
projectForm.onsubmit=saveProjectForm;
noteForm.onsubmit=saveNoteForm;
restoreInput.onchange=()=>restore(restoreInput.files[0]);
document.addEventListener('click',e=>{if(e.target.id==='cancelTask')taskSheet.classList.remove('show');if(e.target.id==='cancelProject')projectSheet.classList.remove('show');if(e.target.id==='cancelNote')noteSheet.classList.remove('show');if(e.target.classList.contains('overlay'))e.target.classList.remove('show')});
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{})}
render();
</script>
</body>
</html>
