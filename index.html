<html lang="ru">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Юрист Банк">
  <meta name="theme-color" content="#0D9488">
  <title>Менеджер задач банковского юриста</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link id="manifestLink" rel="manifest">
  <link id="faviconLink" rel="icon" type="image/svg+xml">
  <link id="appleIconLink" rel="apple-touch-icon">
  <style>
    :root{--accent:#0D9488;--accent-dark:#065F56;--accent-bg:#E6F5F3;--text:#14302d;--muted:#64748b;--line:#dbe7e5;--danger:#dc2626;--shadow:0 12px 30px rgba(13,148,136,.16);--safe-bottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box} html{height:100%} body{margin:0;min-height:100%;font-family:Roboto,Arial,sans-serif;background:#fff;color:var(--text);padding:env(safe-area-inset-top) 0 calc(92px + var(--safe-bottom));}
    button,input,textarea,select{font:inherit;font-size:16px} button{border:0;cursor:pointer} .app{max-width:920px;margin:0 auto;padding:14px 16px 0}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:grid;place-items:center;box-shadow:var(--shadow);color:#fff;font-weight:700}.brand h1{font-size:20px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:2px 0 0}.profile,.iconbtn{width:42px;height:42px;border-radius:50%;background:var(--accent-bg);color:var(--accent);display:grid;place-items:center;font-weight:700}.search{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px 16px;outline:none;box-shadow:0 4px 18px rgba(15,23,42,.04)}.chips{display:flex;gap:8px;overflow:auto;padding:12px 0 4px}.chip{white-space:nowrap;border-radius:999px;padding:9px 13px;background:#fff;color:var(--accent);border:1px solid var(--accent-bg);font-weight:500}.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.tab{border-radius:16px;padding:12px;background:var(--accent-bg);color:var(--accent);font-weight:700}.tab.active{background:var(--accent);color:#fff}.toolbar-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:8px 0 14px}.count{font-weight:700;color:var(--accent)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border-radius:14px;background:var(--accent);color:#fff;padding:10px 13px;font-weight:700}.btn.light{background:var(--accent-bg);color:var(--accent)}.list{display:grid;gap:12px}.card{position:relative;background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px 14px 14px 18px;box-shadow:0 6px 18px rgba(15,23,42,.06);overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--p,#cbd5e1)}.card h3{margin:0 0 7px;font-size:17px}.meta{color:var(--muted);font-size:13px;line-height:1.45}.badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.badge{border-radius:999px;background:var(--accent-bg);color:var(--accent);padding:5px 9px;font-size:12px;font-weight:700}.progress{height:9px;background:var(--accent-bg);border-radius:999px;overflow:hidden;margin-top:10px}.progress span{display:block;height:100%;background:var(--accent)}.fab{position:fixed;right:18px;bottom:calc(18px + var(--safe-bottom));width:64px;height:64px;border-radius:24px;background:var(--accent);color:#fff;font-size:34px;box-shadow:var(--shadow);z-index:10}.modal,.editor{position:fixed;inset:0;background:rgba(6,95,86,.22);display:none;z-index:20;padding:18px 14px calc(18px + var(--safe-bottom));overflow:auto}.modal.show,.editor.show{display:block}.sheet{max-width:760px;margin:0 auto;background:#fff;border-radius:24px;padding:18px;box-shadow:var(--shadow)}.form{display:grid;gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:var(--muted);font-weight:700}.field input,.field select,.field textarea,.editable{border:1px solid var(--line);border-radius:14px;padding:12px;min-height:44px;outline:none}.field textarea{min-height:84px}.editable{min-height:130px;line-height:1.5}.date-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}.date-row input{-webkit-appearance:none;min-height:44px;min-width:0;overflow:hidden}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.editor{background:#fff;padding:0}.editor-shell{min-height:100%;display:flex;flex-direction:column}.editorbar{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:8px;padding:calc(10px + env(safe-area-inset-top)) 12px 10px;background:#fff;border-bottom:1px solid var(--line)}.tool{min-width:40px;height:40px;border-radius:12px;background:var(--accent-bg);color:var(--accent);font-weight:700}.sep{width:1px;height:30px;background:var(--line)}.editor-body{padding:14px;display:grid;gap:12px;max-width:900px;width:100%;margin:0 auto}.note-title{border:0;border-bottom:1px solid var(--line);font-size:22px;font-weight:700;padding:12px;outline:none}.attach-menu{position:absolute;top:58px;right:58px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:6px;display:none}.attach-menu.show{display:grid}.attach-menu button{background:#fff;color:var(--accent);padding:10px 18px;border-radius:12px;text-align:left}.attachments{display:grid;gap:8px}.attachment{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;padding:10px}.attachment a{color:var(--accent);font-weight:700;text-decoration:none;flex:1}.delete{background:#fee2e2;color:var(--danger);border-radius:10px;padding:8px}.empty{text-align:center;color:var(--muted);padding:36px 10px}.hidden{display:none!important}@media(max-width:560px){.app{padding-inline:12px}.date-row{grid-template-columns:1fr}.toolbar-row{align-items:flex-start;flex-direction:column}.actions{width:100%}.btn{flex:1}.brand h1{font-size:18px}}
  </style>
</head>
<body>
  <main class="app"><header class="top"><div class="brand"><div class="logo">✓</div><div><h1>Юрист Банк</h1><p>Задачи, проекты, заметки</p></div></div><button class="profile" title="Профиль">Ю</button></header><input id="search" class="search" placeholder="Поиск по задачам, проектам и заметкам"><section class="chips" id="statusFilters"></section><section class="chips" id="priorityFilters"></section><nav class="tabs"><button class="tab active" data-tab="tasks">Задачи</button><button class="tab" data-tab="projects">Проекты</button><button class="tab" data-tab="notes">Заметки</button></nav><div class="toolbar-row"><div class="count" id="counter"></div><div class="actions"><button class="btn light" id="backupBtn">Резерв</button><button class="btn light" id="restoreBtn">Восстановить</button><button class="btn light" id="csvBtn">CSV</button><input id="restoreFile" type="file" accept="application/json" hidden></div></div><section id="content" class="list"></section></main><button class="fab" id="fab">+</button>
  <section class="modal" id="modal"><div class="sheet"><div class="modal-head"><h2 id="modalTitle">Новая задача</h2><button class="iconbtn" id="closeModal">×</button></div><form class="form" id="itemForm"></form></div></section>
  <section class="editor" id="noteEditor"><div class="editor-shell"><div class="editorbar"><button class="tool" id="closeEditor">✓</button><button class="tool" data-cmd="undo" title="Отменить"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M9 7H4v5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 12c3-5 12-6 16 2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button><button class="tool" data-cmd="redo" title="Повторить"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M15 7h5v5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 12C17 7 8 6 4 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button><span class="sep"></span><button class="tool" data-cmd="bold">B</button><button class="tool" data-cmd="insertUnorderedList">•</button><span class="sep"></span><button class="tool" id="attachBtn"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M8 12.5l6.8-6.8a4 4 0 015.7 5.7l-8.1 8.1a6 6 0 01-8.5-8.5l8.3-8.3" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg></button><div class="attach-menu" id="attachMenu"><button data-accept="*/*">Документ</button><button data-accept="image/*">Фото</button></div><input id="attachInput" type="file" hidden></div><div class="editor-body"><input id="noteTitle" class="note-title" placeholder="Заголовок заметки"><div id="noteBody" class="editable" contenteditable="true"></div><div id="attachments" class="attachments"></div></div></div></section>
<script>
const A='#0D9488', LS={tasks:'lawyerTasks',projects:'lawyerProjects',projectTasks:'lawyerProjectTasks',notes:'lawyerNotes'};
const statuses={all:'Все статусы',new:'Новая',inwork:'В работе',waiting:'Ожидание',done:'Выполнена'}, priorities={all:'Все приоритеты',none:'Нет',low:'Низкий',normal:'Средний',medium:'Средний',high:'Высокий'};
const pColor={none:'#cbd5e1',low:'#5eead4',normal:'#0D9488',medium:'#0D9488',high:'#ef4444'}; let tab='tasks', sf='all', pf='all', editing=null, currentNote=null;
const $=s=>document.querySelector(s), load=k=>JSON.parse(localStorage.getItem(k)||'[]'), save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function id(){return String(Date.now())} function now(){return new Date().toISOString()} function esc(s=''){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function sanitize(html){const t=document.createElement('template');t.innerHTML=html;const ok=['B','STRONG','I','EM','UL','OL','LI','BR','P','DIV'];(function walk(n){[...n.children].forEach(e=>{if(!ok.includes(e.tagName)){e.replaceWith(document.createTextNode(e.textContent));return} [...e.attributes].forEach(a=>{if(a.name!=='style')e.removeAttribute(a.name)}); if(e.getAttribute('style')){let st=e.getAttribute('style').split(';').filter(x=>/^\s*font-(weight|style)\s*:/i.test(x)).join(';'); st?e.setAttribute('style',st):e.removeAttribute('style')} walk(e)})})(t.content);return t.innerHTML}
function seed(){if(!localStorage.getItem(LS.tasks))save(LS.tasks,[{id:id(),title:'Проверить кредитный договор',extra:'Корпоративный клиент, залог недвижимости',dueDate:new Date(Date.now()+864e5*5).toISOString().slice(0,10),reminder:2,priority:'high',status:'new',notes:'<p><b>Проверить:</b></p><ul><li>ковенанты</li><li>условия досрочного взыскания</li></ul>',createdAt:now(),updatedAt:now()}]); if(!localStorage.getItem(LS.projects))save(LS.projects,[{id:id()+1,title:'Реструктуризация портфеля',description:'Сопровождение пакета сделок МСБ',createdAt:now(),updatedAt:now()}]); if(!localStorage.getItem(LS.projectTasks))save(LS.projectTasks,[]); if(!localStorage.getItem(LS.notes))save(LS.notes,[])}
function initAssets(){let svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop stop-color='${A}'/><stop offset='1' stop-color='#065F56'/></linearGradient></defs><rect width='180' height='180' rx='42' fill='url(#g)'/><circle cx='90' cy='90' r='50' fill='rgba(255,255,255,.24)' stroke='rgba(255,255,255,.65)' stroke-width='3'/><path d='M62 91l20 20 40-48' fill='none' stroke='white' stroke-width='13' stroke-linecap='round' stroke-linejoin='round'/></svg>`; faviconLink.href='data:image/svg+xml,'+encodeURIComponent(svg); let m={name:'Менеджер задач банковского юриста',short_name:'Юрист Банк',start_url:'.',display:'standalone',background_color:'#ffffff',theme_color:A,icons:[]}; manifestLink.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(m)); let c=document.createElement('canvas');c.width=c.height=180;let x=c.getContext('2d'),g=x.createLinearGradient(0,0,180,180);g.addColorStop(0,A);g.addColorStop(1,'#065F56');x.fillStyle=g;x.roundRect(0,0,180,180,42);x.fill();x.fillStyle='rgba(255,255,255,.24)';x.strokeStyle='rgba(255,255,255,.65)';x.lineWidth=3;x.beginPath();x.arc(90,90,50,0,7);x.fill();x.stroke();x.strokeStyle='#fff';x.lineWidth=13;x.lineCap='round';x.lineJoin='round';x.beginPath();x.moveTo(62,91);x.lineTo(82,111);x.lineTo(122,63);x.stroke();appleIconLink.href=c.toDataURL('image/png')}
function renderFilters(){statusFilters.innerHTML=Object.entries(statuses).map(([k,v])=>`<button class="chip ${sf==k?'active':''}" data-s="${k}">${v}</button>`).join('');priorityFilters.innerHTML=Object.entries({all:'Все приоритеты',none:'Нет',low:'Низкий',normal:'Средний',high:'Высокий'}).map(([k,v])=>`<button class="chip ${pf==k?'active':''}" data-p="${k}">${v}</button>`).join('')}
function days(d){return d?Math.ceil((new Date(d)-new Date())/864e5):''} function match(x){let q=search.value.toLowerCase();return (!q||JSON.stringify(x).toLowerCase().includes(q))&&(sf=='all'||x.status==sf)&&(pf=='all'||x.priority==pf)}
function taskCard(t){return `<article class="card" style="--p:${pColor[t.priority]||A}" data-open-task="${t.id}"><h3>${esc(t.title)}</h3><div class="meta">${esc(t.extra||'')}<br>Дата ответа: ${esc(t.dueDate||'—')} · до напоминания: ${esc(String(t.reminder||0))} дн. · осталось: ${days(t.dueDate)} дн.</div><div class="badges"><span class="badge">${priorities[t.priority]}</span><span class="badge">${statuses[t.status]}</span></div></article>`}
function render(){renderFilters();document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab==tab)); let html='', active=load(LS.tasks).filter(t=>t.status!='done').length; counter.textContent=tab=='tasks'?`Активных задач: ${active}`:tab=='projects'?'Проекты':'Заметки'; if(tab=='tasks'){let a=load(LS.tasks).filter(match);html=a.map(taskCard).join('')||'<div class="empty">Нет задач</div>'} if(tab=='projects'){let pts=load(LS.projectTasks);html=load(LS.projects).filter(p=>!search.value||JSON.stringify(p).toLowerCase().includes(search.value.toLowerCase())).map(p=>{let sub=pts.filter(t=>t.projectId==p.id), done=sub.filter(t=>t.status=='done').length, pr=sub.length?Math.round(done/sub.length*100):0;return `<article class="card" data-open-project="${p.id}"><h3>${esc(p.title)}</h3><div class="meta">${esc(p.description||'')}<br>Подзадач: ${sub.length}, выполнено: ${done}</div><div class="progress"><span style="width:${pr}%"></span></div></article>`}).join('')||'<div class="empty">Нет проектов</div>'} if(tab=='notes'){html=load(LS.notes).filter(n=>!search.value||JSON.stringify(n).toLowerCase().includes(search.value.toLowerCase())).map(n=>`<article class="card" data-open-note="${n.id}"><h3>${esc(n.title||'Без названия')}</h3><div class="meta">${sanitize(n.body||'').replace(/<[^>]+>/g,' ').slice(0,140)}<br>Вложений: ${(n.attachments||[]).length}</div></article>`).join('')||'<div class="empty">Нет заметок</div>'} content.innerHTML=html}
function formTask(t={}){modalTitle.textContent=t.id?'Задача':'Новая задача';itemForm.innerHTML=`<div class="field"><label>Заголовок</label><input name="title" required value="${esc(t.title||'')}"></div><div class="field"><label>Доп. информация</label><textarea name="extra">${esc(t.extra||'')}</textarea></div><div class="date-row"><div class="field"><label>Дата ответа</label><input type="date" name="dueDate" value="${esc(t.dueDate||'')}"></div><div class="field"><label>Дней до напоминания</label><input type="number" min="0" name="reminder" value="${esc(String(t.reminder||0))}"></div></div><div class="field"><label>Приоритет</label><select name="priority"><option value="none">Нет</option><option value="low">Низкий</option><option value="normal">Средний</option><option value="high">Высокий</option></select></div><div class="field"><label>Статус</label><select name="status"><option value="new">Новая</option><option value="inwork">В работе</option><option value="waiting">Ожидание</option><option value="done">Выполнена</option></select></div><div class="field"><label>Заметки</label><div class="editable" contenteditable="true" id="taskNotes">${sanitize(t.notes||'')}</div></div><div class="actions"><button class="btn">Сохранить</button><button type="button" class="btn light" id="icsBtn">ICS</button></div>`; itemForm.priority.value=t.priority||'none';itemForm.status.value=t.status||'new'; modal.classList.add('show')}

function formProject(p={}){modalTitle.textContent=p.id?'Проект':'Новый проект';itemForm.innerHTML=`<div class="field"><label>Название проекта</label><input name="title" required value="${esc(p.title||'')}"></div><div class="field"><label>Описание</label><textarea name="description">${esc(p.description||'')}</textarea></div><div class="actions"><button class="btn">Сохранить проект</button><button type="button" class="btn light" id="addSubtask">Добавить подзадачу</button></div><div class="list">${load(LS.projectTasks).filter(t=>t.projectId==p.id).map(taskCard).join('')}</div>`;modal.classList.add('show')}
function saveProject(e){e.preventDefault();let f=new FormData(itemForm), arr=load(LS.projects), old=editing&&arr.find(x=>x.id==editing.id), obj={...(old||{}),id:old?.id||id(),title:f.get('title'),description:f.get('description'),createdAt:old?.createdAt||now(),updatedAt:now()}; old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(LS.projects,arr);modal.classList.remove('show');editing=null;render()}

function saveTask(e){e.preventDefault();let f=new FormData(itemForm), key=f.get('projectId')?LS.projectTasks:LS.tasks, arr=load(key), old=editing&&arr.find(x=>x.id==editing.id), obj={...(old||{}),id:old?.id||id(),projectId:f.get('projectId')||old?.projectId,title:f.get('title'),extra:f.get('extra'),dueDate:f.get('dueDate'),reminder:+f.get('reminder')||0,priority:f.get('priority'),status:f.get('status'),notes:sanitize(taskNotes.innerHTML),createdAt:old?.createdAt||now(),updatedAt:now()}; old?arr.splice(arr.indexOf(old),1,obj):arr.push(obj);save(key,arr);modal.classList.remove('show');editing=null;render()}
function openNote(n){currentNote=n||{id:id(),title:'',body:'',attachments:[],createdAt:now(),updatedAt:now()};noteTitle.value=currentNote.title;noteBody.innerHTML=sanitize(currentNote.body||'');renderAttachments();noteEditor.classList.add('show');setTimeout(()=>noteBody.focus(),100)}
function saveNote(){if(!currentNote)return;let arr=load(LS.notes), old=arr.find(x=>x.id==currentNote.id);currentNote.title=noteTitle.value;currentNote.body=sanitize(noteBody.innerHTML);currentNote.updatedAt=now();old?arr.splice(arr.indexOf(old),1,currentNote):arr.push(currentNote);save(LS.notes,arr);render()}
function renderAttachments(){attachments.innerHTML=(currentNote.attachments||[]).map(a=>`<div class="attachment"><span>${icon(a.type)}</span><a href="#" data-dl="${a.id}">${esc(a.name)}</a><small>${fmt(a.size)}</small><button class="delete" data-del="${a.id}">×</button></div>`).join('')}
function icon(t){return /pdf/.test(t)?'📄':/word/.test(t)?'📝':/excel|spreadsheet/.test(t)?'📊':/image/.test(t)?'📷':/video/.test(t)?'🎞️':/zip|rar|archive/.test(t)?'📁':'📎'} function fmt(b){return b<1024?b+' Б':b<1048576?(b/1024).toFixed(1)+' КБ':(b/1048576).toFixed(1)+' МБ'}
function backup(){let data={version:3,tasks:load(LS.tasks).map(t=>({summary:t.title,additionalInfo:t.extra,responseDate:t.dueDate,reminderDays:t.reminder,priority:t.priority,status:t.status=='inwork'?'in-progress':t.status=='done'?'completed':t.status,notes:t.notes})),projects:load(LS.projects),projectTasks:load(LS.projectTasks),notes:load(LS.notes)};download('lawyer-backup-v3.json',JSON.stringify(data,null,2),'application/json')}
function restore(file){let r=new FileReader();r.onload=()=>{let d=JSON.parse(r.result); if(d.version==3&&d.tasks)save(LS.tasks,d.tasks.map(t=>({id:id()+Math.random(),title:t.summary,extra:t.additionalInfo,dueDate:t.responseDate,reminder:t.reminderDays,priority:t.priority=='medium'?'normal':(t.priority||'none'),status:t.status=='in-progress'?'inwork':t.status=='completed'?'done':t.status,notes:t.notes||'',createdAt:now(),updatedAt:now()}))); ['projects','projectTasks','notes'].forEach(k=>d[k]&&save(LS[k],d[k]));render()};r.readAsText(file)}
function download(name,data,type){let a=document.createElement('a'),u=URL.createObjectURL(new Blob([data],{type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
function csvSafe(v){v=String(v??''); if(/^[=+\-@]/.test(v))v="'"+v; return '"'+v.replace(/"/g,'""')+'"'} function exportCsv(){let rows=[['title','extra','dueDate','reminder','priority','status'],...load(LS.tasks).map(t=>[t.title,t.extra,t.dueDate,t.reminder,t.priority,t.status])];download('tasks.csv',rows.map(r=>r.map(csvSafe).join(',')).join('\n'),'text/csv')}
function makeIcs(t){let dt=(t.dueDate||new Date().toISOString().slice(0,10)).replaceAll('-','');download('task.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${t.title}\nDTSTART;VALUE=DATE:${dt}\nBEGIN:VALARM\nTRIGGER:-P${t.reminder||0}D\nACTION:DISPLAY\nDESCRIPTION:${t.title}\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`,'text/calendar')}
seed();initAssets();render();statusFilters.onclick=e=>{if(e.target.dataset.s){sf=e.target.dataset.s;render()}};priorityFilters.onclick=e=>{if(e.target.dataset.p){pf=e.target.dataset.p;render()}};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});search.oninput=render;fab.onclick=()=>tab=='notes'?openNote():(tab=='projects'?formProject():formTask());closeModal.onclick=()=>modal.classList.remove('show');itemForm.onsubmit=e=>modalTitle.textContent.includes('проект')||modalTitle.textContent.includes('Проект')?saveProject(e):saveTask(e);content.onclick=e=>{let c=e.target.closest('[data-open-task]');if(c){editing=load(LS.tasks).find(t=>t.id==c.dataset.openTask);formTask(editing)} let p=e.target.closest('[data-open-project]');if(p){editing=load(LS.projects).find(x=>x.id==p.dataset.openProject);formProject(editing)} let n=e.target.closest('[data-open-note]');if(n)openNote(load(LS.notes).find(x=>x.id==n.dataset.openNote));};document.addEventListener('click',e=>{if(!attachBtn.contains(e.target)&&!attachMenu.contains(e.target))attachMenu.classList.remove('show')});closeEditor.onclick=()=>{saveNote();noteEditor.classList.remove('show')};document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{noteBody.focus();document.execCommand(b.dataset.cmd,false,null)});attachBtn.onclick=e=>{e.stopPropagation();attachMenu.classList.toggle('show')};attachMenu.onclick=e=>{if(e.target.dataset.accept){attachInput.accept=e.target.dataset.accept;attachInput.click()}};attachInput.onchange=()=>{let f=attachInput.files[0]; if(!f)return; if(f.size>5*1024*1024)return alert('Максимальный размер файла — 5 МБ'); let r=new FileReader();r.onload=()=>{currentNote.attachments.push({id:id(),name:f.name,type:f.type,size:f.size,data:r.result});renderAttachments();saveNote()};r.readAsDataURL(f)};attachments.onclick=e=>{let idd=e.target.dataset.del||e.target.dataset.dl;if(!idd)return;let a=currentNote.attachments.find(x=>x.id==idd); if(e.target.dataset.del){currentNote.attachments=currentNote.attachments.filter(x=>x.id!=idd);renderAttachments();saveNote()} else {e.preventDefault();fetch(a.data).then(r=>r.blob()).then(b=>download(a.name,b,a.type))}};backupBtn.onclick=backup;restoreBtn.onclick=()=>restoreFile.click();restoreFile.onchange=()=>restore(restoreFile.files[0]);csvBtn.onclick=exportCsv;document.addEventListener('click',e=>{if(e.target.id=='icsBtn')makeIcs(editing||{}); if(e.target.id=='addSubtask'){let pid=editing?.id; modal.classList.remove('show'); editing=null; formTask(); itemForm.insertAdjacentHTML('beforeend',`<input type="hidden" name="projectId" value="${pid||''}">`)}}); if('serviceWorker' in navigator){let sw=`self.addEventListener('install',e=>e.waitUntil(caches.open('lawyer-pwa-v1').then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(x=>{let y=x.clone();caches.open('lawyer-pwa-v1').then(c=>c.put(e.request,y));return x}).catch(()=>caches.match('./')))))`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{})}
