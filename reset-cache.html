<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#120A8F">
  <title>Обновление приложения</title>
  <style>
    html,body{height:100%;margin:0;background:#fff;color:#120A8F;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    body{display:grid;place-items:center;padding:24px;text-align:center}
    .box{max-width:360px}
    h1{margin:0 0 10px;font-size:24px;line-height:1.1}
    p{margin:0;color:#514DB0;font-size:15px;line-height:1.45}
    a{color:#120A8F;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <h1>Обновляю приложение</h1>
    <p>Сейчас сброшу старый кэш и открою свежую светлую версию.</p>
    <p style="margin-top:16px"><a id="manual" href="./?v=20260706-ultramarine-reset">Открыть вручную</a></p>
  </div>
  <script>
    (async()=>{
      try{
        if('serviceWorker' in navigator){
          const regs=await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r=>r.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
        }
      }catch(e){}
      location.replace('./?v=20260706-ultramarine-reset-'+Date.now());
    })();
  </script>
</body>
</html>
